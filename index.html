<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zombie Horde Survivor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
html,body{overflow:hidden;background:#111;font-family:'Segoe UI',Arial,sans-serif;color:#eee;user-select:none;-webkit-user-select:none;height:100%;width:100%}
#gameCanvas{display:block;position:absolute;top:0;left:0;touch-action:none}
.mobile-btn{display:none;position:absolute;z-index:18;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.35);color:#aaa;font-weight:bold;text-align:center;touch-action:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
#ultBtn{width:64px;height:64px;right:20px;bottom:20px;line-height:64px;font-size:12px}
#pauseBtn{width:36px;height:36px;right:10px;top:10px;line-height:36px;font-size:16px;border-radius:8px}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:10}
.overlay.active{display:flex}
#titleScreen{flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0a0a 0%,#1a0a0a 100%)}
#titleScreen h1{font-size:52px;color:#cc3333;text-shadow:0 0 20px #cc333366,0 0 40px #cc333333;letter-spacing:4px;margin-bottom:10px}
#titleScreen .subtitle{font-size:18px;color:#888;margin-bottom:40px}
.lang-btn{position:absolute;top:15px;right:15px;padding:6px 14px;font-size:14px;border:1px solid #666;background:rgba(0,0,0,.6);color:#aaa;cursor:pointer;font-family:inherit;z-index:25}
.lang-btn:hover{border-color:#ffcc00;color:#ffcc00}
.btn{padding:14px 36px;font-size:18px;border:2px solid #cc3333;background:transparent;color:#cc3333;cursor:pointer;margin:6px;transition:all .2s;letter-spacing:1px;font-family:inherit}
.btn:hover{background:#cc3333;color:#111}
.btn-gold{border-color:#ffcc00;color:#ffcc00}
.btn-gold:hover{background:#ffcc00;color:#111}
.btn-sm{padding:8px 20px;font-size:14px}
#charSelect{flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;padding:20px}
#charSelect h2{font-size:28px;margin-bottom:20px;color:#ccc}
.char-cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.char-card{width:220px;padding:20px;border:2px solid #333;border-radius:8px;background:#1a1a1a;cursor:pointer;transition:all .2s;text-align:center}
.char-card:hover{transform:translateY(-4px);border-color:#666}
.char-card.guardian{border-color:#4488cc55}
.char-card.guardian:hover{border-color:#4488cc}
.char-card.gunslinger{border-color:#cc884455}
.char-card.gunslinger:hover{border-color:#cc8844}
.char-card.shadow{border-color:#8844cc55}
.char-card.shadow:hover{border-color:#8844cc}
.char-icon{width:48px;height:48px;margin:0 auto 10px;border-radius:4px}
.char-card h3{font-size:20px;margin-bottom:6px}
.char-card .role{font-size:13px;color:#888;margin-bottom:10px}
.char-card .stats{font-size:12px;color:#aaa;text-align:left;line-height:1.6}
.char-card .ability{font-size:11px;color:#ccc;margin-top:8px;padding-top:8px;border-top:1px solid #333;text-align:left;line-height:1.5}
.char-card .ability b{color:#eee}
#shopScreen{flex-direction:column;align-items:center;background:#0a0a0a;padding:30px;overflow-y:auto}
#shopScreen h2{font-size:28px;margin-bottom:5px;color:#ccc}
#shopScreen .gold-display{font-size:22px;color:#ffcc00;margin-bottom:20px}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:700px;width:100%}
.shop-item{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;text-align:center}
.shop-item h4{color:#ccc;font-size:16px;margin-bottom:4px}
.shop-item .desc{font-size:12px;color:#888;margin-bottom:8px}
.shop-item .level{font-size:13px;color:#aaa;margin-bottom:6px}
.shop-item .cost{font-size:14px;color:#ffcc00;margin-bottom:8px}
.shop-item .btn{padding:6px 16px;font-size:13px}
.shop-item.maxed{opacity:.5}
#stageSelect{flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a}
#stageSelect h2{font-size:28px;margin-bottom:20px;color:#ccc}
.stage-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.stage-card{width:150px;padding:16px;border:2px solid #333;border-radius:8px;background:#1a1a1a;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.stage-card:hover:not(.locked){transform:translateY(-4px);border-color:#cc3333}
.stage-card.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.stage-card h4{font-size:16px;margin-bottom:4px;pointer-events:none}
.stage-card .diff{font-size:11px;color:#888;pointer-events:none}
.stage-card .boss-name{font-size:11px;color:#cc6633;margin-top:4px;pointer-events:none}
#levelUpOverlay{flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:20}
#levelUpOverlay h2{font-size:24px;color:#ffcc00;margin-bottom:16px;text-shadow:0 0 10px #ffcc0066}
.upgrade-cards{display:flex;gap:16px;justify-content:center}
.upgrade-card{width:190px;padding:16px;border:2px solid #444;border-radius:8px;background:#1a1a1a;cursor:pointer;text-align:center;transition:all .15s}
.upgrade-card:hover{transform:scale(1.08);border-color:#ffcc00}
.upgrade-card.rare{border-color:#ffcc00;box-shadow:0 0 15px #ffcc0044}
.upgrade-card .icon{font-size:24px;margin-bottom:4px}
.upgrade-card h4{font-size:14px;color:#eee;margin-bottom:4px}
.upgrade-card .desc{font-size:11px;color:#aaa;line-height:1.4}
.upgrade-card .rarity-label{font-size:10px;color:#ffcc00;margin-top:4px}
#resultsScreen{flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a}
#resultsScreen h2{font-size:28px;margin-bottom:16px}
#resultsScreen .stats{font-size:16px;line-height:2;color:#ccc}
#resultsScreen .stats span{color:#ffcc00}
#pauseOverlay{flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:20}
#pauseOverlay h2{font-size:28px;margin-bottom:20px}
.back-btn{position:absolute;top:15px;left:15px;z-index:15;padding:6px 14px;font-size:13px;border:1px solid #555;background:rgba(0,0,0,.5);color:#aaa;cursor:pointer;font-family:inherit}
.back-btn:hover{border-color:#cc3333;color:#cc3333}
@media(max-width:768px){
#titleScreen h1{font-size:32px;letter-spacing:2px}
#titleScreen .subtitle{font-size:14px;margin-bottom:24px}
.btn{padding:10px 24px;font-size:15px}
.btn-sm{padding:6px 14px;font-size:12px}
.char-card{width:160px;padding:12px}
.char-card h3{font-size:16px}
.char-card .stats{font-size:11px}
.char-card .ability{font-size:10px}
.shop-grid{grid-template-columns:repeat(2,1fr);gap:10px}
.shop-item{padding:10px}
.shop-item h4{font-size:13px}
.shop-item .desc{font-size:10px}
.stage-card{width:100px;padding:10px}
.stage-card h4{font-size:13px}
.upgrade-card{width:130px;padding:10px}
.upgrade-card h4{font-size:12px}
.upgrade-card .desc{font-size:10px}
.upgrade-card .icon{font-size:18px}
#levelUpOverlay h2{font-size:18px;margin-bottom:10px}
#resultsScreen h2{font-size:22px}
#resultsScreen .stats{font-size:13px}
#pauseOverlay h2{font-size:22px}
.mobile-btn{display:block}
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ultBtn" class="mobile-btn">ULT</div>
<div id="pauseBtn" class="mobile-btn">⏸</div>

<div id="titleScreen" class="overlay active">
<button class="lang-btn" id="titleLangBtn" onclick="toggleLanguage()">EN/中文</button>
<h1>ZOMBIE HORDE</h1>
<div class="subtitle" id="titleSubtitle">SURVIVOR</div>
<button class="btn" id="startBtn" onclick="switchScreen('characterSelect')">START GAME</button>
</div>

<div id="charSelect" class="overlay">
<button class="back-btn" id="charBackBtn" onclick="switchScreen('title')">Back</button>
<h2 id="charSelectTitle">Choose Your Survivor</h2>
<div class="char-cards" id="charCards"></div>
</div>

<div id="shopScreen" class="overlay">
<button class="back-btn" id="shopBackBtn" onclick="switchScreen('stageSelect')">Back</button>
<h2 id="shopTitle">Permanent Upgrades</h2>
<div class="gold-display" id="shopGold">Gold: 0</div>
<div class="shop-grid" id="shopGrid"></div>
<div style="margin-top:24px"><button class="btn btn-gold" id="shopToStageBtn" onclick="switchScreen('stageSelect')">Go to Stage Select</button></div>
</div>

<div id="stageSelect" class="overlay">
<button class="back-btn" id="stageBackBtn" onclick="switchScreen('characterSelect')">Back</button>
<h2 id="stageSelectTitle">Select Stage</h2>
<div class="stage-cards" id="stageCards"></div>
<div style="margin-top:24px"><button class="btn btn-gold" id="stageToShopBtn" onclick="switchScreen('shop')">Visit Shop</button></div>
</div>

<div id="levelUpOverlay" class="overlay">
<h2 id="levelUpTitle">LEVEL UP!</h2>
<div class="upgrade-cards" id="upgradeCards"></div>
</div>

<div id="resultsScreen" class="overlay">
<h2 id="resultsTitle">Stage Complete!</h2>
<div class="stats" id="resultsStats"></div>
<div style="margin-top:24px"><button class="btn btn-gold" id="resultsContinueBtn" onclick="switchScreen('shop')">Continue to Shop</button></div>
</div>

<div id="pauseOverlay" class="overlay">
<h2 id="pauseTitle">PAUSED</h2>
<button class="btn" id="resumeBtn" onclick="resumeGame()">Resume</button>
<button class="btn" id="restartBtn" onclick="restartRun()">Restart</button>
<button class="btn" id="quitBtn" onclick="quitToShop()">Quit to Shop</button>
<button class="lang-btn" style="position:static;margin-top:12px" onclick="toggleLanguage()">EN/中文</button>
</div>

function distXY(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); }
function angleXY(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); }

function lerp(a, b, t) { return a + (b - a) * t; }

// Touch movement: drag from touch origin
let touchDir = { x: 0, y: 0 };
let touchActive = false;
let touchOrigin = { x: 0, y: 0 };
const TOUCH_DEAD_ZONE = 15;

function updateTouchDir(touchX, touchY) {
    const dx = touchX - touchOrigin.x, dy = touchY - touchOrigin.y;
    const dist = Math.hypot(dx, dy);
    if (dist < TOUCH_DEAD_ZONE) { touchDir.x = 0; touchDir.y = 0; }
    else { touchDir.x = dx / dist; touchDir.y = dy / dist; }
}

// Touch on canvas: drag from touch point to move
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (currentScreen !== 'inGame' || !game || game.paused || game.runOver) return;
    const t = e.changedTouches[0];
    touchActive = true;
    touchOrigin.x = t.clientX; touchOrigin.y = t.clientY;
    touchDir.x = 0; touchDir.y = 0;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchActive) return;
    const t = e.changedTouches[0];
    updateTouchDir(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchActive = false; touchDir.x = 0; touchDir.y = 0;
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
    touchActive = false; touchDir.x = 0; touchDir.y = 0;
});

});

// ==================== SPATIAL HASH ====================
class SpatialHash {
    constructor(cs) { this.cs = cs; this.cells = {}; }
    clear() { this.cells = {}; }
    _key(cx, cy) { return cx + ',' + cy; }
    insert(obj) {
        const cx = Math.floor(obj.x / this.cs);
        const cy = Math.floor(obj.y / this.cs);
        const k = this._key(cx, cy);
        (this.cells[k] || (this.cells[k] = [])).push(obj);
    }
    query(x, y, r) {
        const results = [];
        const cx = Math.floor(x / this.cs);
        const cy = Math.floor(y / this.cs);
        const cr = Math.ceil(r / this.cs) + 1;
        for (let dx = -cr; dx <= cr; dx++)
            for (let dy = -cr; dy <= cr; dy++) {
                const c = this.cells[this._key(cx + dx, cy + dy)];
                if (c) for (let i = 0; i < c.length; i++) results.push(c[i]);
            }
        return results;
    }
}

// ==================== SCREEN MANAGEMENT ====================
function switchScreen(screen) {
    document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
    currentScreen = screen;
    const map = {
        title: 'titleScreen', characterSelect: 'charSelect', shop: 'shopScreen',
        stageSelect: 'stageSelect', levelUp: 'levelUpOverlay',
        results: 'resultsScreen', pause: 'pauseOverlay'
    };
    if (map[screen]) document.getElementById(map[screen]).classList.add('active');
    if (screen === 'shop') renderShop();
    if (screen === 'stageSelect') renderStageSelect();
    if (screen === 'characterSelect') renderCharSelect();
    // Show mobile buttons only during gameplay
    const showMobile = isMobile && screen === 'inGame';
    ultBtn.style.display = showMobile ? 'block' : 'none';
    pauseBtnEl.style.display = showMobile ? 'block' : 'none';
    refreshAllUI();
}
