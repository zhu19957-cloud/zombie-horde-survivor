<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Zombie Horde Survivor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;background:#111;font-family:'Segoe UI',Arial,sans-serif;color:#eee;user-select:none;-webkit-user-select:none;height:100%;width:100%}
#gameCanvas{display:block;position:absolute;top:0;left:0;touch-action:none;pointer-events:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:10;flex-direction:column;align-items:center;justify-content:center}
.overlay.active{display:flex}
#titleScreen{background:linear-gradient(180deg,#0a0a0a,#1a0a0a)}
#titleScreen h1{font-size:48px;color:#cc3333;text-shadow:0 0 20px #cc333366;letter-spacing:4px;margin-bottom:8px}
#titleScreen .sub{font-size:16px;color:#888;margin-bottom:32px}
.lang-btn{position:absolute;top:12px;right:12px;padding:8px 14px;font-size:13px;border:1px solid #666;background:rgba(0,0,0,.6);color:#aaa;cursor:pointer;z-index:25;border-radius:4px;min-height:36px}
.lang-btn:hover,.lang-btn:active{border-color:#ffcc00;color:#ffcc00}
.btn{padding:12px 32px;font-size:16px;border:2px solid #cc3333;background:transparent;color:#cc3333;cursor:pointer;margin:5px;transition:all .2s;letter-spacing:1px;font-family:inherit;border-radius:4px;min-height:44px}
.btn:hover,.btn:active{background:#cc3333;color:#111}
.btn-gold{border-color:#ffcc00;color:#ffcc00}
.btn-gold:hover,.btn-gold:active{background:#ffcc00;color:#111}
.btn-sm{padding:6px 16px;font-size:13px}
#charSelect{background:#0a0a0a;padding:20px}
#charSelect h2{font-size:24px;margin-bottom:16px;color:#ccc}
.char-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.char-card{width:210px;padding:16px;border:2px solid #333;border-radius:8px;background:#1a1a1a;cursor:pointer;transition:all .2s;text-align:center}
.char-card:hover{transform:translateY(-3px);border-color:#666}
.char-card.guardian{border-color:#4488cc44}.char-card.guardian:hover,.char-card.guardian:active{border-color:#4488cc}
.char-card.gunslinger{border-color:#cc884444}.char-card.gunslinger:hover,.char-card.gunslinger:active{border-color:#cc8844}
.char-card.shadow{border-color:#8844cc44}.char-card.shadow:hover,.char-card.shadow:active{border-color:#8844cc}
.char-icon{width:40px;height:40px;margin:0 auto 8px;border-radius:4px}
.char-card h3{font-size:18px;margin-bottom:4px}.char-card .role{font-size:12px;color:#888;margin-bottom:8px}
.char-card .stats{font-size:11px;color:#aaa;text-align:left;line-height:1.5}
.char-card .ability{font-size:10px;color:#ccc;margin-top:6px;padding-top:6px;border-top:1px solid #333;text-align:left;line-height:1.4}
.char-card .ability b{color:#eee}
#shopScreen{background:#0a0a0a;padding:24px;overflow-y:auto;flex-direction:column;align-items:center}
#shopScreen h2{font-size:24px;margin-bottom:4px;color:#ccc}
#shopScreen .gold-display{font-size:20px;color:#ffcc00;margin-bottom:8px}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:660px;width:100%}
.shop-item{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:12px;text-align:center}
.shop-item h4{color:#ccc;font-size:14px;margin-bottom:3px}.shop-item .desc{font-size:11px;color:#888;margin-bottom:6px}
.shop-item .level{font-size:12px;color:#aaa;margin-bottom:4px}.shop-item .cost{font-size:13px;color:#ffcc00;margin-bottom:6px}
.shop-item.maxed{opacity:.5}
#stageSelect{background:#0a0a0a}
#stageSelect h2{font-size:24px;margin-bottom:16px;color:#ccc}
.stage-cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.stage-card{width:140px;padding:14px;border:2px solid #333;border-radius:6px;background:#1a1a1a;cursor:pointer;text-align:center;transition:all .2s}
.stage-card:hover:not(.locked){transform:translateY(-3px);border-color:#cc3333}
.stage-card.locked{opacity:.35;cursor:not-allowed}
.stage-card h4{font-size:14px;margin-bottom:3px;pointer-events:none}
.stage-card .diff{font-size:10px;color:#888;pointer-events:none}
.stage-card .boss-name{font-size:10px;color:#cc6633;margin-top:3px;pointer-events:none}
.stage-card .lock-text{font-size:10px;color:#cc3333;margin-top:4px;pointer-events:none}
#levelUpOverlay{background:rgba(0,0,0,.75);z-index:20}
#levelUpOverlay h2{font-size:22px;color:#ffcc00;margin-bottom:14px;text-shadow:0 0 10px #ffcc0066}
.upgrade-cards{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.upgrade-card{width:180px;padding:14px;border:2px solid #444;border-radius:8px;background:#1a1a1a;cursor:pointer;text-align:center;transition:all .15s}
.upgrade-card:hover,.upgrade-card:active{transform:scale(1.06);border-color:#ffcc00}
.upgrade-card.rare{border-color:#ffcc00;box-shadow:0 0 15px #ffcc0044}
.upgrade-card h4{font-size:13px;color:#eee;margin-bottom:3px}
.upgrade-card .desc{font-size:10px;color:#aaa;line-height:1.3}
.upgrade-card .rarity-label{font-size:9px;color:#ffcc00;margin-top:3px}
#resultsScreen{background:#0a0a0a}
#resultsScreen h2{font-size:24px;margin-bottom:14px}
#resultsScreen .stats{font-size:15px;line-height:2;color:#ccc}
#resultsScreen .stats span{color:#ffcc00}
#pauseOverlay{background:rgba(0,0,0,.7);z-index:20}
#pauseOverlay h2{font-size:24px;margin-bottom:16px}
.back-btn{position:absolute;top:12px;left:12px;z-index:15;padding:8px 14px;font-size:12px;border:1px solid #555;background:rgba(0,0,0,.5);color:#aaa;cursor:pointer;border-radius:4px;min-height:36px}
.back-btn:hover,.back-btn:active{border-color:#cc3333;color:#cc3333}
@media(max-width:768px){
#titleScreen h1{font-size:28px;letter-spacing:2px}
.btn{padding:10px 24px;font-size:15px;min-height:44px}
.char-card{width:140px;padding:10px}.char-card h3{font-size:14px}
.shop-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.stage-card{width:110px;padding:10px}
.upgrade-card{width:130px;padding:10px}
#shopScreen{padding:16px}
}
@media(max-width:480px){
#titleScreen h1{font-size:22px;letter-spacing:1px}
#titleScreen .sub{font-size:13px;margin-bottom:20px}
.btn{padding:10px 20px;font-size:14px}
.char-cards{gap:8px}
.char-card{width:100%;max-width:280px;padding:12px}
.stage-card{width:90px;padding:8px}
.upgrade-card{width:100%;max-width:250px}
#levelUpOverlay h2{font-size:18px;margin-bottom:10px}
.upgrade-cards{gap:8px}
#shopScreen{padding:10px}
#shopScreen h2{font-size:18px}
#shopScreen .gold-display{font-size:16px}
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="titleScreen" class="overlay active">
<button class="lang-btn" id="titleLangBtn">EN/中文</button>
<h1>ZOMBIE HORDE</h1>
<div class="sub" id="titleSub">SURVIVOR</div>
<button class="btn" id="startBtn">START GAME</button>
<button class="btn btn-gold" id="shopBtn">SHOP</button>
</div>
<div id="charSelect" class="overlay">
<button class="back-btn" id="charBackBtn">Back</button>
<h2 id="charTitle">Choose Your Survivor</h2>
<div class="char-cards" id="charCards"></div>
</div>
<div id="shopScreen" class="overlay">
<button class="back-btn" id="shopBackBtn">Back</button>
<h2 id="shopTitle">Talent Tree</h2>
<div class="gold-display" id="shopGold">Gold: 0</div>
<canvas id="talentCanvas" style="display:block;margin:0 auto;cursor:pointer"></canvas>
</div>
<div id="stageSelect" class="overlay">
<button class="back-btn" id="stageBackBtn">Back</button>
<h2 id="stageTitle">Select Stage</h2>
<div class="stage-cards" id="stageCards"></div>
</div>
<div id="levelUpOverlay" class="overlay">
<h2 id="luTitle">LEVEL UP!</h2>
<div class="upgrade-cards" id="upgradeCards"></div>
</div>
<div id="resultsScreen" class="overlay">
<h2 id="resultsTitle">Stage Complete!</h2>
<div class="stats" id="resultsStats"></div>
<button class="btn" id="resultsBtn">Continue</button>
</div>
<div id="pauseOverlay" class="overlay">
<h2 id="pauseTitle">PAUSED</h2>
<button class="btn" id="resumeBtn">Resume</button>
<button class="btn" id="restartBtn">Restart</button>
<button class="btn" id="quitBtn">Quit to Shop</button>
<button class="lang-btn" id="pauseLangBtn" style="position:static;margin-top:10px">EN/中文</button>
</div>

function getTalentLvl(id){return(saveData.talents&&saveData.talents[id])||0}
function canUnlockTalent(t){
if(getTalentLvl(t.id)>=t.maxLvl)return false;
const cost=t.cost(getTalentLvl(t.id));
if(saveData.gold<cost)return false;
for(const pid of t.prereqs){const pt=TALENT_LIST.find(x=>x.id===pid);if(!pt||getTalentLvl(pid)<1)return false}
return true
}

let saveData={gold:0,talents:{},unlockedStages:[1],totalRuns:0,totalKills:0,language:'en'};
function migrateOldSave(d){
if(!d.talents)d.talents={};
if(d.upgrades){const u=d.upgrades;
if(u.vitality)d.talents.vitality=Math.min(20,u.vitality);
if(u.power)d.talents.power=Math.min(10,u.power);
if(u.agility)d.talents.agility=Math.min(5,u.agility);
if(u.precision)d.talents.precision=Math.min(5,u.precision);
if(u.greed)d.talents.greed=Math.min(10,u.greed);
if(u.headStart)d.talents.headStart=Math.min(5,u.headStart);
delete d.upgrades}
return d
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);if(r){const d=JSON.parse(r);saveData.gold=d.gold||0;saveData.unlockedStages=(d.unlockedStages&&d.unlockedStages.length>0)?d.unlockedStages:[1];saveData.totalRuns=d.totalRuns||0;saveData.totalKills=d.totalKills||0;saveData.language=d.language||'en';
const migrated=migrateOldSave(d);saveData.talents=migrated.talents||{};
// Ensure all talents exist
for(const t of TALENT_LIST)if(saveData.talents[t.id]===undefined)saveData.talents[t.id]=0;
}}catch(e){}lang=saveData.language||'en';
// Ensure all talents exist even without save data
for(const t of TALENT_LIST)if(saveData.talents[t.id]===undefined)saveData.talents[t.id]=0}
function saveSave(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData))}catch(e){}}
// ==================== SPATIAL HASH ====================
class SpatialHash{
constructor(cs){this.cs=cs;this.m={}}
clear(){this.m={}}
insert(e){const k=`${Math.floor(e.x/this.cs)},${Math.floor(e.y/this.cs)}`;(this.m[k]||(this.m[k]=[])).push(e)}
query(x,y,r){const res=[];const x0=Math.floor((x-r)/this.cs),x1=Math.floor((x+r)/this.cs),y0=Math.floor((y-r)/this.cs),y1=Math.floor((y+r)/this.cs);for(let cx=x0;cx<=x1;cx++)for(let cy=y0;cy<=y1;cy++){const c=this.m[`${cx},${cy}`];if(c)for(const e of c)res.push(e)}return res}
}

// ==================== LEVEL UP ====================
function showLevelUp(){
G.paused=true;
const avail=UPGRADES.filter(u=>!u.charReq||u.charReq===G.charId);
const picks=[],pool=[...avail],pickedIds=new Set();
const isRareLvl=(G.level===5||G.level===10||G.level===15);
for(let i=0;i<3&&pool.length>0;i++){
const roll=Math.random();let cat;
if(roll<0.30)cat='off';else if(roll<0.55)cat='def';else if(roll<0.75)cat='util';else if(roll<0.90)cat='spec';else cat='char';
const catPool=pool.filter(u=>u.cat===cat&&!pickedIds.has(u.id));
const usePool=catPool.length>0?catPool:pool.filter(u=>!pickedIds.has(u.id));
const finalPool=usePool.length>0?usePool:pool;
const tw=finalPool.reduce((s,u)=>s+u.weight,0);
let r=Math.random()*tw,pick=finalPool[0];
for(const u of finalPool){r-=u.weight;if(r<=0){pick=u;break}}
const isRare=isRareLvl&&i===0;
picks.push({...pick,rare:isRare});pickedIds.add(pick.id);
const idx=pool.indexOf(pick);if(idx>=0)pool.splice(idx,1)
}
const cont=document.getElementById('upgradeCards');cont.innerHTML='';
document.getElementById('luTitle').textContent=t('levelUp');
picks.forEach(pick=>{
const card=document.createElement('div');card.className='upgrade-card'+(pick.rare?' rare':'');
let desc=t(pick.id+'Desc');
if(pick.rare)desc=desc.replace(/(\+?)(\d+\.?\d*)(%?)/g,(m,p,ns,pc)=>{const n=parseFloat(ns);return isNaN(n)?m:(p||'')+(n*1.8)+(pc||'')});
card.innerHTML=`<h4>${t(pick.id)}</h4><div class="desc">${desc}</div>${pick.rare?`<div class="rarity-label">${t('rare18x')}</div>`:''}`;
card.onclick=()=>{
const stacks=G.upgradeStacks[pick.id]||0;
const n=pick.rare?1.8*Math.pow(0.75,stacks):Math.pow(0.75,stacks);
pick.apply(G,n);
G.upgradeStacks[pick.id]=(G.upgradeStacks[pick.id]||0)+1;
if(G.orbitalShield>0&&G.orbitalOrbs.length===0)initOrbitalOrbs();
if(G.pendingLevelUps>0){G.pendingLevelUps--;showLevelUp()}
else{G.paused=false;switchScreen('inGame')}
};cont.appendChild(card)});
switchScreen('levelUp')
}
// ==================== DAMAGE ====================
function damageEnemy(enemy,dmg,isCrit){
if(enemy.dead)return;
if(enemy.flashTimer<=0)enemy.flashTimer=0.1;
const isBack=false;// simplified: no backstab for now
if(enemy.type==='shielder'&&!enemy.isBoss){const shieldDmg=Math.min(enemy.shieldHP,dmg);enemy.shieldHP-=shieldDmg;dmg-=shieldDmg;if(dmg<=0)return}
if(enemy.isBoss&&enemy.shieldHP>0){const shieldDmg=Math.min(enemy.shieldHP,dmg);enemy.shieldHP-=shieldDmg;dmg-=shieldDmg}
let finalDmg=Math.max(1,Math.round(dmg*G.weakenMult));
if(isCrit)finalDmg=Math.round(finalDmg*G.critDmg);
enemy.hp-=finalDmg;
addFloat(enemy.x,enemy.y-enemy.size,(isCrit?'CRIT ':'')+finalDmg,isCrit?'#ffcc00':'#fff',clamp(10+finalDmg*0.3,10,30));
if(isCrit){G.screenShake=0.08;G.shakeIntensity=2}
if(G.lifeSteal>0)G.hp=Math.min(G.maxHP,G.hp+finalDmg*G.lifeSteal);
if(G.chainChance>0&&Math.random()<G.chainChance){
const near=G.spatial.query(enemy.x,enemy.y,80);
for(const ne of near){if(ne.isEnemy&&!ne.dead&&ne!==enemy&&dist(ne.x,ne.y,enemy.x,enemy.y)<80){
const cd=Math.round(finalDmg*G.chainDmg);damageEnemy(ne,cd,false);
addFloat(ne.x,ne.y-ne.size,cd,'#88ccff',10);
G.particles.push({x:enemy.x,y:enemy.y,dx:0,dy:0,lifetime:0.15,maxLifetime:0.15,size:2,color:'#ffff44',alpha:1,isArc:true,tx:ne.x,ty:ne.y});break}}
}
if(G.burnDmg>0)enemy.burnTimer=G.burnDur;
if(enemy.hp<=0&&!enemy.dead)killEnemy(enemy)
}

function killEnemy(enemy){
if(enemy.dead)return;enemy.dead=true;
const stageGoldMult=1+0.2*(G.stage-1);
let effMult=Math.min(3,stageGoldMult*G.goldMult);
if(G.fortune>0&&Math.random()<G.fortune)effMult*=2;
let goldAmt=Math.round(enemy.gold*effMult);
if(G.totalGoldEarned+goldAmt>GOLD_CAP){goldAmt=Math.max(0,GOLD_CAP-Math.floor(G.totalGoldEarned));G.goldCapReached=true}
G.gold+=goldAmt;G.totalGoldEarned+=goldAmt;
if(goldAmt>0)addFloat(enemy.x,enemy.y-enemy.size-8,'+'+goldAmt+'g','#ffcc00',11);
const stageXPMult=1+0.3*(G.stage-1);
G.xpOrbs.push({x:enemy.x,y:enemy.y,xp:Math.round(enemy.xp*stageXPMult),lifetime:30});
if(G.frozenTrail)G.frozenTrailSegs.push({x:enemy.x,y:enemy.y,lifetime:1.5,slow:G.frozenTrailSlow});
if(enemy.type==='necrotic')G.hazards.push({type:'toxic',x:enemy.x,y:enemy.y,radius:50,damage:G.stage>=5?6:5,damageType:'slow',slowAmt:0.2,warningTimer:0.5,activeTimer:6,stageOrigin:G.stage});
if(enemy.type==='bomber'&&!enemy.isBoss)G.explosions.push({x:enemy.x,y:enemy.y,timer:0.5,radius:60,damage:enemy.damage});
if(fpsVal>=25)for(let i=0;i<randInt(3,5);i++)G.particles.push({x:enemy.x,y:enemy.y,dx:rand(-60,60),dy:rand(-60,60),lifetime:0.5,maxLifetime:0.5,size:rand(2,4),color:enemy.color,alpha:1});
if(fpsVal>=25)G.particles.push({x:enemy.x,y:enemy.y,dx:0,dy:0,lifetime:0.3,maxLifetime:0.3,size:enemy.size/2,color:enemy.color,alpha:0.8,isRing:true,expandRate:80});
G.kills++;G.waveKillCount++;G.comboCount++;G.comboTimer=3;
if(G.comboCount===10||G.comboCount===20||G.comboCount===30){G.xpOrbs.push({x:G.px,y:G.py,xp:G.comboCount*2,lifetime:30});addFloat(G.px,G.py-50,G.comboCount+'x COMBO!','#ff8800',22)}
if(enemy.isBoss){G.bossDefeated=true;G.boss=null;addFloat(G.px,G.py-60,t('bossDefeated'),'#ffcc00',28);G.screenShake=0.5;G.shakeIntensity=8;for(let i=0;i<5;i++)G.xpOrbs.push({x:enemy.x+rand(-20,20),y:enemy.y+rand(-20,20),xp:10,lifetime:30})}
}

function damagePlayer(dmg,src){
if(G.iFrames>0||G.ultActive&&G.charId==='guardian')return;
if((G.dodgeChance||0)>0&&Math.random()<G.dodgeChance){addFloat(G.px,G.py-20,t('dodge'),'#88ccff',14);return}
if(G.hasShield&&G.shieldReady){G.shieldReady=false;G.shieldTimer=G.shieldCD;addFloat(G.px,G.py-20,t('blocked'),'#88ccff',14);return}
let finalDmg=Math.max(1,dmg-G.armor);
finalDmg=Math.round(finalDmg*G.defMult*(1-(G.fortifyDR||0)));
G.hp-=finalDmg;G.iFrames=0.2;G.screenShake=0.15;G.shakeIntensity=3;
addFloat(G.px,G.py-15,'-'+finalDmg,'#ff4444',14);
if(G.thorns>0&&src&&src.isEnemy&&!src.dead){const th=Math.round(finalDmg*G.thorns);src.hp-=th;if(src.hp<=0&&!src.dead)killEnemy(src)}
if(G.hp<=0){G.runOver=true;G.stageFailed=true;endRun(false)}
}
// ==================== UPDATE: PLAYER ====================
function updatePlayer(dt){
if(G.stunTimer>0){G.stunTimer-=dt;return}
let dx=0,dy=0;
if(keys.has('KeyW')||keys.has('ArrowUp'))dy=-1;
if(keys.has('KeyS')||keys.has('ArrowDown'))dy=1;
if(keys.has('KeyA')||keys.has('ArrowLeft'))dx=-1;
if(keys.has('KeyD')||keys.has('ArrowRight'))dx+=1;
if(dx!==0||dy!==0){const len=Math.hypot(dx,dy);dx/=len;dy/=len;
G.px+=dx*G.spd*G.spdMult*(1-G.hazardSlow)*60*dt;G.py+=dy*G.spd*G.spdMult*(1-G.hazardSlow)*60*dt;G.facing=Math.atan2(dy,dx)}
// Arena bounds
const d2=Math.hypot(G.px,G.py);if(d2>ARENA_R-G.charDef.size/2){const a=Math.atan2(G.py,G.px);G.px=Math.cos(a)*(ARENA_R-G.charDef.size/2);G.py=Math.sin(a)*(ARENA_R-G.charDef.size/2)}
// Regen
if(G.hpRegen>0)G.hp=Math.min(G.maxHP,G.hp+G.hpRegen*dt);
// Power-up heal
if(G.healPS>0)G.hp=Math.min(G.maxHP,G.hp+G.healPS*dt);
// Burn timer on enemies handled in enemy update
// Frozen trail (throttled)
G.frozenTrailTimer-=dt;if(G.frozenTrail&&(dx!==0||dy!==0)&&G.frozenTrailTimer<=0){G.frozenTrailTimer=0.05;G.frozenTrailSegs.push({x:G.px,y:G.py,lifetime:1.5,slow:G.frozenTrailSlow})};
// HP regen from shop
// iFrames
if(G.iFrames>0)G.iFrames-=dt;
// Shield recharge
if(G.hasShield&&!G.shieldReady){G.shieldTimer-=dt;if(G.shieldTimer<=0)G.shieldReady=true}
// Ult CD
if(G.ultCDTimer>0)G.ultCDTimer-=dt;
// Weaken
if(G.weakenTimer>0){G.weakenTimer-=dt;if(G.weakenTimer<=0)G.weakenMult=1}
// Lightning aura
if(G.lightningAuraDmg>0){G.lightningAuraTimer-=dt;if(G.lightningAuraTimer<=0){G.lightningAuraTimer=G.lightningAuraCD;const near=findNearest(G.px,G.py,100);if(near){damageEnemy(near,G.lightningAuraDmg,false);G.particles.push({x:G.px,y:G.py,dx:0,dy:0,lifetime:0.15,maxLifetime:0.15,size:2,color:'#ffffff',alpha:1,isArc:true,tx:near.x,ty:near.y})}}}
// Whirlwind
if(G.whirlwind){G.whirlwindTimer-=dt;if(G.whirlwindTimer<=0){G.whirlwindTimer=G.whirlwindCD;const near=G.spatial.query(G.px,G.py,G.whirlwindRange);for(const e of near){if(e.isEnemy&&!e.dead&&dist(e.x,e.y,G.px,G.py)<G.whirlwindRange){const a=angle(e.x,e.y,G.px,G.py);e.x+=Math.cos(a)*12;e.y+=Math.sin(a)*12}}}}
// Fortify (Guardian passive)
if(G.charId==='guardian'){const near=G.spatial.query(G.px,G.py,100);let cnt=0;for(const e of near)if(e.isEnemy&&!e.dead&&dist(e.x,e.y,G.px,G.py)<100)cnt++;G.fortifyDR=Math.min(0.30,cnt*0.03)}else G.fortifyDR=0;
// Active power-up timer
if(G.activePowerUp){G.activePowerUp.remaining-=dt;if(G.activePowerUp.remaining<=0)removePowerUp()}
}

// ==================== AUTO-ATTACK ====================
function updateAutoAttack(dt){
G.autoCDTimer-=dt;
if(G.autoCDTimer>0)return;
const ch=G.charDef;
const atkSpd=G.atkSpd*G.atkSpdMult;
const cd=ch.autoCD/atkSpd;
// Find nearest enemy in range
let nearest=null,nearDist=G.autoRange;
for(const e of G.enemies){if(e.dead||e.fadeIn>0)continue;const d=dist(e.x,e.y,G.px,G.py);if(d<nearDist){nearDist=d;nearest=e}}
if(!nearest)return;
G.autoCDTimer=cd;G.attackCounter++;
const a=angle(G.px,G.py,nearest.x,nearest.y);G.facing=a;
let isCrit=Math.random()<G.crit;
if(G.charId==='gunslinger'&&G.attackCounter%5===0)isCrit=true;
const baseDmg=G.atk*G.atkMult;
if(G.charId==='guardian'){
// Cleave arc
const near=G.spatial.query(G.px,G.py,G.autoRange);
for(const e of near){if(!e.isEnemy||e.dead)continue;const ea=angle(G.px,G.py,e.x,e.y);if(Math.abs(angleDiff(a,ea))<G.cleaveArc/2){damageEnemy(e,baseDmg,isCrit)}}
G.isAttacking=true;G.attackTimer=0.15;G.attackAngle=a;
if(fpsVal>=25)for(let j=-2;j<=2;j++){const sa=a+j*(G.cleaveArc/5);G.particles.push({x:G.px+Math.cos(sa)*G.autoRange*0.6,y:G.py+Math.sin(sa)*G.autoRange*0.6,dx:Math.cos(sa)*40,dy:Math.sin(sa)*40,lifetime:0.15,maxLifetime:0.15,size:4,color:'#88bbff',alpha:0.7})}
}else if(G.charId==='gunslinger'){
const count=Math.max(3,G.projCount);const spread=0.15;
for(let i=0;i<count;i++){const sa=a+(i-Math.floor(count/2))*spread;
G.projectiles.push({x:G.px,y:G.py,dx:Math.cos(sa),dy:Math.sin(sa),speed:ch.projSpeed,damage:baseDmg*0.7,piercing:G.piercing,owner:'player',lifetime:2,knockback:isCrit?2:1,isCrit})}
if(fpsVal>=25)G.particles.push({x:G.px+Math.cos(a)*15,y:G.py+Math.sin(a)*15,dx:0,dy:0,lifetime:0.08,maxLifetime:0.08,size:8,color:'#ffcc44',alpha:0.9})
}else if(G.charId==='shadow'){
// Combo system
G.comboStep=(G.comboStep||0)+1;if(G.comboStep>5)G.comboStep=1;
const comboMult=[1.0,1.0,1.0,1.2,1.5][G.comboStep-1];
const dmg=baseDmg*(ch.shadowBladeDmg||1.2)*comboMult;
if(G.comboStep===5){G.autoCDTimer=cd*1.2;G.comboStep=0}
damageEnemy(nearest,dmg,isCrit);
if(fpsVal>=25)for(let j=-2;j<=2;j++){const sa=a+j*0.15;G.particles.push({x:G.px+Math.cos(a)*20,y:G.py+Math.sin(a)*20,dx:Math.cos(sa)*80,dy:Math.sin(sa)*80,lifetime:0.15,maxLifetime:0.15,size:3,color:'#aa66ff',alpha:0.9})}
G.particles.push({x:G.px,y:G.py,dx:0,dy:0,lifetime:0.4,maxLifetime:0.4,size:ch.size,color:'#8844cc',alpha:0.6,isAfterimage:true,facing:G.facing});
G.afterimages.push({target:nearest,timer:0.3,mult:G.afterimageMult})
}
// Sharpshooter knockback
if(G.charId==='gunslinger'&&isCrit){const ka=angle(G.px,G.py,nearest.x,nearest.y);nearest.x+=Math.cos(ka)*10*2;nearest.y+=Math.sin(ka)*10*2}
}

// ==================== AFTERIMAGE ====================
function updateAfterimages(dt){
for(let i=G.afterimages.length-1;i>=0;i--){
const a=G.afterimages[i];a.timer-=dt;
if(a.timer<=0){if(a.target&&!a.target.dead&&G.enemies.includes(a.target))damageEnemy(a.target,G.atk*G.atkMult*a.mult,false);
G.afterimages.splice(i,1)}
}
// Shadow clones from Time Warp
for(let i=G.clones.length-1;i>=0;i--){
const c=G.clones[i];c.timer-=dt;c.cdTimer-=dt;
if(c.timer<=0){G.clones.splice(i,1);continue}
if(c.cdTimer<=0){const near=findNearest(c.x,c.y,G.autoRange);if(near){damageEnemy(near,G.atk*G.atkMult*0.4,false);c.cdTimer=G.charDef.autoCD/G.atkSpd}}
c.x=lerp(c.x,G.px,0.02);c.y=lerp(c.y,G.py,0.02)
}
}

// ==================== ENEMIES ====================
function findNearest(x,y,r){let best=null,bd=r;for(const e of G.enemies){if(e.dead||e.fadeIn>0)continue;const d=dist(e.x,e.y,x,y);if(d<bd){bd=d;best=e}}return best}

function updateEnemies(dt){
for(let i=G.enemies.length-1;i>=0;i--){
const e=G.enemies[i];
if(e.dead){G.enemies.splice(i,1);continue}
e.fadeIn=Math.max(0,e.fadeIn-dt);e.flashTimer=Math.max(0,e.flashTimer-dt);e.contactCD=Math.max(0,e.contactCD-dt);
if(e.frozenTimer>0){e.frozenTimer-=dt;continue}
if(e.burnTimer>0){e.burnTimer-=dt;e.hp-=G.burnDmg*dt;if(e.hp<=0&&!e.dead)killEnemy(e)}
if(e.isBoss){updateBoss(e,dt);continue}
const a=angle(e.x,e.y,G.px,G.py);e.facing=a;
let spdMult=1;
if(G.magnetField>0&&dist(e.x,e.y,G.px,G.py)<40)spdMult*=(1-G.magnetField);
for(const seg of G.frozenTrailSegs){if(dist(e.x,e.y,seg.x,seg.y)<15){spdMult*=(1-seg.slow);break}}
// Time Warp slow
if(G.ultActive&&G.charId==='shadow')spdMult*=0.5;
if(e.type==='spitter'){
const d=dist(e.x,e.y,G.px,G.py);
if(d>120)e.x+=Math.cos(a)*e.speed*60*dt*spdMult;else if(d<80){e.x-=Math.cos(a)*e.speed*60*dt*spdMult;e.y-=Math.sin(a)*e.speed*60*dt*spdMult}
e.specialTimer-=dt;if(e.specialTimer<=0&&d<=250){e.specialTimer=2;for(let j=-1;j<=1;j++){const sa=a+j*0.2;G.projectiles.push({x:e.x,y:e.y,dx:Math.cos(sa),dy:Math.sin(sa),speed:4,damage:e.damage,piercing:0,owner:'enemy',lifetime:3})}}
}else if(e.type==='healer'){
e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult;
e.healPulseTimer-=dt;if(e.healPulseTimer<=0){e.healPulseTimer=2;const near=G.spatial.query(e.x,e.y,80);for(const ne of near)if(ne.isEnemy&&!ne.dead&&ne!==e&&dist(ne.x,ne.y,e.x,e.y)<80)ne.hp=Math.min(ne.maxHp,ne.hp+3);
if(fpsVal>=25)G.particles.push({x:e.x,y:e.y,dx:0,dy:0,lifetime:0.5,maxLifetime:0.5,size:40,color:'#4a7c7c',alpha:0.3})}
}else if(e.type==='bomber'){
e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult;
if(e.hp/e.maxHp<0.5)spdMult*=1.8;
}else if(e.type==='shielder'){
e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult;
}else if(e.type==='flanker'){
const d=dist(e.x,e.y,G.px,G.py);
if(d>80){const tx=G.px+Math.cos(G.facing+Math.PI)*60,ty=G.py+Math.sin(G.facing+Math.PI)*60;const ma=angle(e.x,e.y,tx,ty);e.x+=Math.cos(ma)*e.speed*60*dt*spdMult;e.y+=Math.sin(ma)*e.speed*60*dt*spdMult}
else{e.x+=Math.cos(a)*e.speed*1.5*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*1.5*60*dt*spdMult}
}else if(e.type==='charger'){
if(!e.isCharging){e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult;e.chargeTimer-=dt;if(e.chargeTimer<=0){e.isCharging=true;e.chargeDir=a;e.chargeDur=0.4}}
else{e.x+=Math.cos(e.chargeDir)*6*60*dt;e.y+=Math.sin(e.chargeDir)*6*60*dt;e.chargeDur-=dt;if(e.chargeDur<=0){e.isCharging=false;e.chargeTimer=2}}
}else if(e.type==='teleporter'){
const td=dist(e.x,e.y,G.px,G.py);
if(td>180)e.x+=Math.cos(a)*e.speed*60*dt*spdMult,e.y+=Math.sin(a)*e.speed*60*dt*spdMult;
else if(td<100)e.x-=Math.cos(a)*e.speed*0.5*60*dt*spdMult,e.y-=Math.sin(a)*e.speed*0.5*60*dt*spdMult;
e.teleportCD-=dt;if(e.teleportCD<=0){e.teleportCD=2;
if(fpsVal>=25)for(let j=0;j<5;j++)G.particles.push({x:e.x+rand(-5,5),y:e.y+rand(-5,5),dx:rand(-30,30),dy:rand(-30,30),lifetime:0.3,maxLifetime:0.3,size:3,color:'#7c4a9c',alpha:0.8});
const ta=rand(0,Math.PI*2);e.x=G.px+Math.cos(ta)*rand(80,150);e.y=G.py+Math.sin(ta)*rand(80,150)}
e.shootCD-=dt;if(e.shootCD<=0&&td<=250){e.shootCD=1.5;
const pa=angle(e.x,e.y,G.px,G.py);G.projectiles.push({x:e.x,y:e.y,dx:Math.cos(pa),dy:Math.sin(pa),speed:2.5,damage:e.damage,piercing:0,owner:'enemy',lifetime:4,homing:0.02})}
}else if(e.type==='necrotic'){
e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult;
}else{
e.x+=Math.cos(a)*e.speed*60*dt*spdMult;e.y+=Math.sin(a)*e.speed*60*dt*spdMult}
// Arena bounds clamp
const eDist=Math.hypot(e.x,e.y);const maxR=ARENA_R-e.size/2;if(eDist>maxR){const ea=Math.atan2(e.y,e.x);e.x=Math.cos(ea)*maxR;e.y=Math.sin(ea)*maxR}
// Contact damage
const cd=dist(e.x,e.y,G.px,G.py);const cdist=e.size/2+G.charDef.size/2;
if(cd<cdist&&e.contactCD<=0){damagePlayer(e.damage,e);e.contactCD=CONTACT_CD}
// Remove far away enemies
if(!e.isBoss&&Math.hypot(e.x,e.y)>ARENA_R+200){G.enemies.splice(i,1);continue}
}
}

// ==================== SPAWN ====================
function getWave(){return G.waveNumber||1}
function getSpawnInterval(){
const w=G.waveNumber||1;const idx=Math.min(w,WAVE_SPAWN.length)-1;
return WAVE_SPAWN[Math.max(0,idx)]
}

function getSpawnPos(count){
const positions=[];const numPoints=randInt(2,4);
for(let i=0;i<numPoints;i++){
const a2=rand(0,Math.PI*2);const pos={x:Math.cos(a2)*(ARENA_R+30),y:Math.sin(a2)*(ARENA_R+30)};
let valid=true;for(const p of positions)if(dist(p.x,p.y,pos.x,pos.y)<60){valid=false;break}
if(valid)positions.push(pos)}
return positions
}

function updateSpawn(dt){
// Boss entrance pause
if(G.bossEntranceTimer>0){G.bossEntranceTimer-=dt;return}
// Boss defeated check
if(G.bossDefeated&&!G.runOver){G.runOver=true;G.stageComplete=true;const bonus=50*G.stage;G.gold+=bonus;G.totalGoldEarned+=bonus;endRun(true);return}
// Wave break
if(G.waveBreakTimer>0){G.waveBreakTimer-=dt;return}
// Wave completion check
if(G.waveKillCount>=G.waveKillTarget&&!G.bossSpawned){
addFloat(G.px,G.py-60,'WAVE '+G.waveNumber+' CLEAR!','#ffcc00',22);
if(fpsVal>=25)G.particles.push({x:G.px,y:G.py,dx:0,dy:0,lifetime:0.5,maxLifetime:0.5,size:30,color:'#ffcc00',alpha:0.6,isRing:true,expandRate:200});
if(G.waveNumber>=G.totalWaves){spawnBoss();return}
G.waveNumber++;G.waveKillCount=0;
G.waveKillTarget=Math.round(G.sd.enemiesPerWave*G.sd.diffMult*(1+0.15*(G.waveNumber-1)));
G.waveBreakTimer=2;
// Wave announce
if(G.waveNumber>G.lastWave){G.lastWave=G.waveNumber;G.waveAnnounceTimer=2}
// Elite wave
if(G.sd.eliteWaves&&G.sd.eliteWaves.includes(G.waveNumber)){spawnElite()}
return
}
if(G.waveAnnounceTimer>0)G.waveAnnounceTimer-=dt;
// Normal spawn
const nm=G.sd.normalSpawnMult;
let interval=getSpawnInterval()/nm;
if(G.bossSpawned)interval=0.5;
G.spawnTimer-=dt;
if(G.spawnTimer<=0&&G.enemies.length<SOFT_ENEMY){G.spawnTimer=interval;spawnNormal()}
// Special spawn
const canSpecial=G.waveNumber>=G.sd.specialFromWave;
G.specialSpawnTimer-=dt;
if(G.specialSpawnTimer<=0&&canSpecial&&G.enemies.length<HARD_ENEMY){spawnSpecial();G.specialSpawnTimer=G.waveNumber>=5?12:20}
}

function spawnNormal(){
const r=Math.random();const t2=G.gameTime;
const swRatio=lerp(0.2,0.4,t2/300),rnRatio=lerp(0.3,0.2,t2/300);
let type;if(r<swRatio)type='swarmer';else if(r<swRatio+rnRatio)type='runner';else type='walker';
const dm=G.sd.diffMult;const pos=getSpawnPos(1);if(pos.length===0)return;
const cnt=type==='swarmer'?randInt(20,30):type==='runner'?randInt(8,12):randInt(2,4);
for(let i=0;i<cnt&&G.enemies.length<HARD_ENEMY;i++)G.enemies.push(createEnemy(type,pos[0].x+rand(-20,20),pos[0].y+rand(-20,20),dm))
}
function spawnSpecial(){
const types=['spitter','bomber','shielder','healer','flanker','charger','teleporter','necrotic'];
const type=types[randInt(0,types.length-1)];
const pos=getSpawnPos(1);if(pos.length===0)return;
G.enemies.push(createEnemy(type,pos[0].x,pos[0].y,G.sd.diffMult))
}
function spawnElite(){
const types=['spitter','bomber','shielder','healer','flanker','charger','teleporter','necrotic'];
const type=types[randInt(0,types.length-1)];
const pos=getSpawnPos(1);if(pos.length===0)return;
const e=createEnemy(type,pos[0].x,pos[0].y,G.sd.diffMult*2);
e.hp*=3;e.maxHp*=3;e.damage*=1.5;e.size*=1.3;e.isElite=true;
G.enemies.push(e);
addFloat(e.x,e.y-e.size,'ELITE!','#ff8800',18)
}
// ==================== COLLISION ====================
function updateCollisions(){
// Player-enemy separation
for(const e of G.enemies){if(e.dead)continue;
const d=dist(e.x,e.y,G.px,G.py);const minD=G.charDef.size/2+e.size/2+1;
if(d<minD&&d>0){const overlap=minD-d;const ax=(G.px-e.x)/d,ay=(G.py-e.y)/d;
G.px+=ax*overlap*0.7;G.py+=ay*overlap*0.7;e.x-=ax*overlap*0.3;e.y-=ay*overlap*0.3}}
// Enemy-enemy separation (limited iterations)
for(let iter=0;iter<3;iter++){let moved=false;
for(const e of G.enemies){if(e.dead)continue;const near=G.spatial.query(e.x,e.y,e.size+10);
for(const ne of near){if(ne===e||ne.dead)continue;const d=dist(e.x,e.y,ne.x,ne.y);const minD=e.size/2+ne.size/2+3;
if(d<minD&&d>0){const overlap=minD-d;const ax=(e.x-ne.x)/d,ay=(e.y-ne.y)/d;
e.x+=ax*overlap*0.5;e.y+=ay*overlap*0.5;ne.x-=ax*overlap*0.5;ne.y-=ay*overlap*0.5;moved=true}}}
if(!moved)break}
}

// ==================== PROJECTILES ====================
function updateProjectiles(dt){
for(let i=G.projectiles.length-1;i>=0;i--){
const p=G.projectiles[i];if(!p.trail)p.trail=[];p.trail.push({x:p.x,y:p.y});if(p.trail.length>3)p.trail.shift();
	// Homing
	if(p.homing&&p.owner==='enemy'){const ha=angle(p.x,p.y,G.px,G.py);const ca=Math.atan2(p.dy,p.dx);const da=angleDiff(ca,ha);const turn=clamp(da,-p.homing*60*dt,p.homing*60*dt);const na=ca+turn;p.dx=Math.cos(na);p.dy=Math.sin(na)}
	p.x+=p.dx*p.speed*60*dt;p.y+=p.dy*p.speed*60*dt;p.lifetime-=dt;
if(p.lifetime<=0){G.projectiles.splice(i,1);continue}
if(p.owner==='player'){
const near=G.spatial.query(p.x,p.y,30);
for(const e of near){if(!e.isEnemy||e.dead)continue;if(dist(p.x,p.y,e.x,e.y)<e.size/2+3){
damageEnemy(e,p.damage,!!p.isCrit);
if(p.knockback){const ka=angle(G.px,G.py,e.x,e.y);e.x+=Math.cos(ka)*10*p.knockback;e.y+=Math.sin(ka)*10*p.knockback}
if(p.piercing>0)p.piercing--;else{G.projectiles.splice(i,1);break}}}
}else if(p.owner==='enemy'){
if(dist(p.x,p.y,G.px,G.py)<G.charDef.size/2+4){damagePlayer(p.damage,null);G.projectiles.splice(i,1)}
}
}
}
// ==================== XP ORBS ====================
function updateXPOrbs(dt){
// Cap orbs
while(G.xpOrbs.length>80){const nearest=G.xpOrbs.reduce((a,b)=>dist(a.x,a.y,G.px,G.py)<dist(b.x,b.y,G.px,G.py)?a:b);G.xp+=nearest.xp*(G.xpMult||1);G.xpOrbs.splice(G.xpOrbs.indexOf(nearest),1)}
for(let i=G.xpOrbs.length-1;i>=0;i--){
const orb=G.xpOrbs[i];orb.lifetime-=dt;const d=dist(orb.x,orb.y,G.px,G.py);
if(d<G.pickupRange){const a2=angle(orb.x,orb.y,G.px,G.py);const speed=Math.max(200,400-d);orb.x+=Math.cos(a2)*speed*dt;orb.y+=Math.sin(a2)*speed*dt}
if(d<10){G.xp+=orb.xp*(G.xpMult||1);G.xpOrbs.splice(i,1);
while(G.xp>=G.xpToNext&&G.level<MAX_LVL){G.xp-=G.xpToNext;G.level++;G.xpToNext=xpForLevel(G.level);
addFloat(G.px,G.py-30,t('levelUp'),'#ffcc00',20);
if(fpsVal>=25)G.particles.push({x:G.px,y:G.py,dx:0,dy:0,lifetime:0.6,maxLifetime:0.6,size:10,color:'#ffcc00',alpha:0.8,isRing:true,expandRate:120});
G.pendingLevelUps++}
if(G.pendingLevelUps>0&&!G.paused){G.pendingLevelUps--;showLevelUp()}}
else if(orb.lifetime<=0)G.xpOrbs.splice(i,1)}
}

// ==================== PARTICLES ====================
function updateParticles(dt){
// Cap particles
while(G.particles.length>250)G.particles.shift();
while(G.floatingTexts.length>40)G.floatingTexts.shift();
for(let i=G.particles.length-1;i>=0;i--){
const p=G.particles[i];p.x+=p.dx*dt;p.y+=p.dy*dt;p.dx*=0.95;p.dy*=0.95;p.lifetime-=dt;
if(p.lifetime<=0){G.particles.splice(i,1);continue}
p.alpha=clamp(p.lifetime/p.maxLifetime,0,1);
if(p.isAcid&&dist(p.x,p.y,G.px,G.py)<15){if(!p._acidCD||p._acidCD<=0){p._acidCD=1;damagePlayer(5,null)}}if(p._acidCD>0)p._acidCD-=dt
}
for(let i=G.floatingTexts.length-1;i>=0;i--){G.floatingTexts[i].y-=40*dt;G.floatingTexts[i].lifetime-=dt;if(G.floatingTexts[i].lifetime<=0)G.floatingTexts.splice(i,1)}
// Frozen trail
for(let i=G.frozenTrailSegs.length-1;i>=0;i--){G.frozenTrailSegs[i].lifetime-=dt;if(G.frozenTrailSegs[i].lifetime<=0)G.frozenTrailSegs.splice(i,1)}
// Explosions
for(let i=G.explosions.length-1;i>=0;i--){const ex=G.explosions[i];ex.timer-=dt;if(ex.timer<=0){const near=G.spatial.query(ex.x,ex.y,ex.radius);for(const e of near)if(e.isEnemy&&!e.dead&&dist(e.x,e.y,ex.x,ex.y)<ex.radius)damageEnemy(e,ex.damage,false);if(dist(G.px,G.py,ex.x,ex.y)<ex.radius+G.charDef.size/2)damagePlayer(ex.damage,null);G.explosions.splice(i,1);
if(fpsVal>=25)G.particles.push({x:ex.x,y:ex.y,dx:0,dy:0,lifetime:0.5,maxLifetime:0.5,size:ex.radius,color:'#ff2200',alpha:0.5,isRing:true,expandRate:0})}}
}

function addFloat(x,y,text,color,size){G.floatingTexts.push({x,y,text,color,size:size||12,lifetime:0.8,maxLifetime:0.8})}

// ==================== HAZARDS ====================
function updateHazards(dt){
const hz=G.sd.hazards;if(hz.length===0)return;
G.hazardTimer-=dt;if(G.hazardTimer<=0){
if(hz.includes('ember')){const count=randInt(2,3);for(let i=0;i<count;i++){const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-50);
G.hazards.push({type:'ember',x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,radius:40,damage:3,damageType:'dot',warningTimer:1,activeTimer:8,stageOrigin:G.stage})}}
if(hz.includes('toxic')){const count=randInt(3,4);for(let i=0;i<count;i++){const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-50);
G.hazards.push({type:'toxic',x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,radius:50,damage:G.stage>=5?6:5,damageType:'slow',slowAmt:0.2,warningTimer:1,activeTimer:G.stage>=5?12:10,stageOrigin:G.stage})}}
if(hz.includes('spike')){for(let i=0;i<2;i++){const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-50);
G.hazards.push({type:'spike',x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,radius:30,damage:G.stage>=6?15:12,damageType:'instant',warningTimer:0.8,activeTimer:0.1,stageOrigin:G.stage})}}
if(hz.includes('lightning')){for(let i=0;i<randInt(1,2);i++){const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-50);
G.hazards.push({type:'lightning',x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,radius:50,damage:18,damageType:'instant',warningTimer:1.5,activeTimer:0.1,stageOrigin:G.stage})}}
if(hz.includes('void')){const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-80);
G.hazards.push({type:'void',x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,radius:80,damage:8,damageType:'dot',warningTimer:2,activeTimer:15,stageOrigin:G.stage,expandRate:2})}
G.hazardTimer=hz.includes('void')?20:hz.includes('lightning')?8:12}
// Update existing hazards
for(let i=G.hazards.length-1;i>=0;i--){
const h=G.hazards[i];
if(h.warningTimer>0){h.warningTimer-=dt}else{
h.activeTimer-=dt;
if(dist(h.x,h.y,G.px,G.py)<h.radius+G.charDef.size/2){
if(h.damageType==='dot'){G.hp-=h.damage*dt;if(h.slowAmt)G.hazardSlow=h.slowAmt}
if(h.damageType==='instant'&&h.activeTimer>0){damagePlayer(h.damage,null);h.activeTimer=0}}
if(h.expandRate)h.radius+=h.expandRate*dt;
if(h.activeTimer<=0)G.hazards.splice(i,1)}
}
}

// ==================== POWER-UPS ====================
function updatePowerUps(dt){
// Spawn timer
if(G.gameTime<20)return;
G.powerUpSpawnTimer-=dt;
if(G.powerUpSpawnTimer<=0&&!G.fieldPowerUp){
const type=POWERUP_TYPES[randInt(0,5)];
const a2=rand(0,Math.PI*2),r2=rand(50,ARENA_R-50);
G.fieldPowerUp={type:type,x:Math.cos(a2)*r2,y:Math.sin(a2)*r2,despawnTimer:15,bobPhase:0};
G.powerUpSpawnTimer=rand(25,40)}
// Field power-up
if(G.fieldPowerUp){
G.fieldPowerUp.despawnTimer-=dt;G.fieldPowerUp.bobPhase+=dt;
if(G.fieldPowerUp.despawnTimer<=0){G.fieldPowerUp=null}
else if(dist(G.px,G.py,G.fieldPowerUp.x,G.fieldPowerUp.y)<G.charDef.size/2+15){
// Collect
removePowerUp();
const pu=G.fieldPowerUp.type;
G.activePowerUp={type:pu,remaining:pu.duration};
pu.effect(G);G.fieldPowerUp=null;
if(fpsVal>=25)G.particles.push({x:G.px,y:G.py,dx:0,dy:0,lifetime:0.4,maxLifetime:0.4,size:30,color:pu.color,alpha:0.6,isRing:true,expandRate:60})}
}
}
function removePowerUp(){
if(!G.activePowerUp)return;
G.atkMult=1;G.spdMult=1;G.defMult=1;G.atkSpdMult=1;G.healPS=0;
// Rebuild goldMult from talent greed + upgrade stacks
let gm=1+((saveData.talents&&saveData.talents.greed)||0)*0.1;
const gbStacks=G.upgradeStacks['goldBonus']||0;
if(gbStacks>0){for(let s=0;s<gbStacks;s++){gm*=(1+0.15*Math.pow(0.75,s))}}
G.goldMult=gm;
G.activePowerUp=null
}

// ==================== STAGE ====================
function updateStage(dt){
G.gameTime+=dt;G.stageTime-=dt;
// No timer failure - stage only fails on player death
if(G.screenShake>0)G.screenShake-=dt;
if(G.screenFlash>0)G.screenFlash-=dt;
if(G.isAttacking){G.attackTimer-=dt;if(G.attackTimer<=0)G.isAttacking=false}
}
function endRun(victory){
saveData.gold+=Math.floor(G.totalGoldEarned);saveData.totalRuns++;saveData.totalKills+=G.kills;
if(victory&&G.stage<6&&!saveData.unlockedStages.includes(G.stage+1))saveData.unlockedStages.push(G.stage+1);
saveSave();
const title=document.getElementById('resultsTitle');title.textContent=victory?t('stageComplete'):t('stageFailed');title.style.color=victory?'#ffcc00':'#cc3333';
document.getElementById('resultsStats').innerHTML=`${t('goldEarned')}: <span>${Math.floor(G.totalGoldEarned)}</span><br>${t('kills')}: <span>${G.kills}</span><br>${t('timeSurvived')}: <span>${Math.floor(G.gameTime)}s</span><br>${t('levelReached')}: <span>${G.level}</span>`;
setTimeout(()=>switchScreen('results'),500)
}
// ==================== RENDERING ====================
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();
function render(){
ctx.clearRect(0,0,canvas.width,canvas.height);
if(!G||(screen!=='inGame'&&screen!=='levelUp'&&screen!=='pause'))return;
const camX=G.px-canvas.width/2,camY=G.py-canvas.height/2;
let sx=0,sy=0;if(G.screenShake>0){sx=rand(-G.shakeIntensity,G.shakeIntensity);sy=rand(-G.shakeIntensity,G.shakeIntensity)}
ctx.save();ctx.translate(-camX+sx,-camY+sy);
renderGround();renderHazards();renderFrozenTrail();
// Poison clouds from boss
if(G.boss&&G.boss.poisonClouds)for(const c of G.boss.poisonClouds){ctx.fillStyle=`rgba(42,61,26,${0.3*(c.lifetime/4)})`;ctx.beginPath();ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);ctx.fill()}
renderXPOrbs();renderFieldPowerUp();renderEnemies();renderProjectiles();renderPlayer();renderOrbitalShield();renderParticles();
ctx.restore();
renderHUD();
if(G.bossSpawned&&G.boss&&!G.bossDefeated)renderBossHP();
if(G.screenFlash>0){ctx.fillStyle=G.flashColor;ctx.globalAlpha=G.screenFlash;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.globalAlpha=1}
// Vignette when low HP
if(G.hp/G.maxHP<0.3){const int=1-(G.hp/G.maxHP)/0.3;const grad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*0.3,canvas.width/2,canvas.height/2,canvas.width*0.7);grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,`rgba(100,0,0,${int*0.4})`);ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height)}
}

function renderGround(){
const camX=G.px-canvas.width/2,camY=G.py-canvas.height/2;
ctx.fillStyle='#1a1a1a';ctx.fillRect(camX,camY,canvas.width,canvas.height);
// Grid
ctx.strokeStyle='#222';ctx.lineWidth=1;
const gs=64;const sx2=Math.floor(camX/gs)*gs,sy2=Math.floor(camY/gs)*gs;
for(let x=sx2;x<camX+canvas.width;x+=gs){ctx.beginPath();ctx.moveTo(x,camY);ctx.lineTo(x,camY+canvas.height);ctx.stroke()}
for(let y=sy2;y<camY+canvas.height;y+=gs){ctx.beginPath();ctx.moveTo(camX,y);ctx.lineTo(camX+canvas.width,y);ctx.stroke()}
// Arena border
ctx.strokeStyle='#333';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,ARENA_R,0,Math.PI*2);ctx.stroke()
}

function renderHazards(){
for(const h of G.hazards){
if(h.warningTimer>0){
const pulse=0.5+0.5*Math.sin(Date.now()/250);
if(h.type==='ember'){ctx.strokeStyle=`rgba(255,140,0,${0.3+0.3*pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
else if(h.type==='toxic'){ctx.strokeStyle=`rgba(80,200,80,${0.3+0.3*pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
else if(h.type==='spike'){ctx.strokeStyle=`rgba(150,150,150,${0.3+0.3*pulse})`;ctx.lineWidth=2;ctx.strokeRect(h.x-h.radius,h.y-h.radius,h.radius*2,h.radius*2)}
else if(h.type==='lightning'){ctx.strokeStyle=`rgba(255,255,68,${0.3+0.3*pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
else if(h.type==='void'){ctx.strokeStyle=`rgba(80,0,120,${0.3+0.3*pulse})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
}else{
if(h.type==='ember'){ctx.fillStyle='rgba(255,100,0,0.25)';ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,100,0,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
else if(h.type==='toxic'){ctx.fillStyle='rgba(80,200,80,0.2)';ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(80,200,80,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
else if(h.type==='spike'){ctx.fillStyle='rgba(150,150,150,0.4)';ctx.fillRect(h.x-h.radius,h.y-h.radius,h.radius*2,h.radius*2)}
else if(h.type==='lightning'){ctx.fillStyle='rgba(255,255,68,0.4)';ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.fill()}
else if(h.type==='void'){ctx.fillStyle='rgba(80,0,120,0.25)';ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(80,0,120,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(h.x,h.y,h.radius,0,Math.PI*2);ctx.stroke()}
}
}
}

function renderFrozenTrail(){for(const seg of G.frozenTrailSegs){ctx.fillStyle='rgba(136,204,255,0.25)';ctx.beginPath();ctx.arc(seg.x,seg.y,10,0,Math.PI*2);ctx.fill()}}
function renderXPOrbs(){ctx.fillStyle='#44ff44';for(const orb of G.xpOrbs){ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(orb.x,orb.y,3,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}

function renderFieldPowerUp(){
if(!G.fieldPowerUp)return;const pu=G.fieldPowerUp;
const by=pu.y+Math.sin(pu.bobPhase*4)*3;
const flicker=pu.despawnTimer<5?0.5+0.5*Math.sin(Date.now()/125):1;
ctx.globalAlpha=flicker;ctx.fillStyle=pu.type.color;ctx.beginPath();ctx.arc(pu.x,by,12,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(pu.type.icon,pu.x,by+4);
ctx.globalAlpha=1
}

function renderEnemies(){
const camX=G.px-canvas.width/2,camY=G.py-canvas.height/2;
const vis=G.enemies.filter(e=>!e.dead&&e.x-camX>-50&&e.x-camX<canvas.width+50&&e.y-camY>-50&&e.y-camY<canvas.height+50);
vis.sort((a,b)=>a.y-b.y);
for(const e of vis){
if(e.previewTimer>0){ctx.globalAlpha=0.3;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(e.x,e.y,e.size/2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;continue}
if(e.frozenTimer>0){ctx.fillStyle='#88ccff44';ctx.beginPath();ctx.arc(e.x,e.y,e.size/2+3,0,Math.PI*2);ctx.fill()}
const size=(e.hp/e.maxHp<0.3)?e.size*0.85:e.size;
const fa=e.fadeIn>0?1-(e.fadeIn/0.3):1;ctx.globalAlpha=fa;
ctx.fillStyle=e.flashTimer>0?'#fff':e.color;ctx.beginPath();ctx.arc(e.x,e.y,size/2,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=e.flashTimer>0?'#fff':e.color;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(e.x,e.y,size/2+1,0,Math.PI*2);ctx.stroke();
if(e.special&&!e.isBoss){ctx.strokeStyle='#ffffff44';ctx.lineWidth=1;ctx.beginPath();ctx.arc(e.x,e.y,size/2+3,0,Math.PI*2);ctx.stroke()}
// Elite glow
if(e.isElite){ctx.strokeStyle='#ff880088';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,size/2+4,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='#ff880044';ctx.lineWidth=1;ctx.beginPath();ctx.arc(e.x,e.y,size/2+6,0,Math.PI*2);ctx.stroke()}
// Shielder arc
if(e.type==='shielder'&&!e.isBoss){ctx.strokeStyle='#88888866';ctx.lineWidth=3;ctx.beginPath();ctx.arc(e.x,e.y,size/2+1,e.facing-Math.PI/2,e.facing+Math.PI/2);ctx.stroke()}
// Healer pulse
if(e.type==='healer'&&e.healPulseTimer>1.5){ctx.strokeStyle='#4a7c7c44';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,80*(1-(e.healPulseTimer-1.5)/0.5),0,Math.PI*2);ctx.stroke()}
// Burn indicator
if(e.burnTimer>0){ctx.fillStyle=`rgba(255,140,0,${0.2*Math.random()})`;ctx.beginPath();ctx.arc(e.x,e.y,size/2+2,0,Math.PI*2);ctx.fill()}
ctx.globalAlpha=1;
// HP bar for non-boss damaged enemies
if(!e.isBoss&&e.hp<e.maxHp){const bw=e.size+8,bh=3,bx=e.x-bw/2,by2=e.y+e.size/2+4;
ctx.fillStyle='#333';ctx.fillRect(bx,by2,bw,bh);ctx.fillStyle='#cc3333';ctx.fillRect(bx,by2,bw*Math.max(0,e.hp/e.maxHp),bh)}
// Boss HP bar
if(e.isBoss){const bw=e.size+10,bh=4,bx=e.x-bw/2,by2=e.y+e.size/2+6;
ctx.fillStyle='#333';ctx.fillRect(bx,by2,bw,bh);ctx.fillStyle='#cc3333';ctx.fillRect(bx,by2,bw*Math.max(0,e.hp/e.maxHp),bh)}
}
}

function renderProjectiles(){
for(const p of G.projectiles){
if(p.trail&&p.trail.length>1){
ctx.strokeStyle=p.owner==='player'?'rgba(255,204,0,0.3)':'rgba(255,68,68,0.3)';
ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);
for(let i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);ctx.stroke()}
ctx.shadowBlur=p.owner==='player'?8:6;
ctx.shadowColor=p.owner==='player'?'#ffcc00':'#ff4444';
ctx.fillStyle=p.owner==='player'?'#ffcc00':'#ff4444';
ctx.beginPath();ctx.arc(p.x,p.y,p.owner==='player'?3:3.5,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0
}
}

function renderPlayer(){
const ch=G.charDef;const flash=G.iFrames>0&&Math.sin(G.iFrames*30)>0;
if(flash)return;
ctx.fillStyle=ch.color;ctx.save();ctx.translate(G.px,G.py);
if(G.charId==='guardian'){ctx.fillRect(-ch.size/2,-ch.size/2,ch.size,ch.size);
if(G.isAttacking){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,G.autoRange,G.attackAngle-G.cleaveArc/2,G.attackAngle+G.cleaveArc/2);ctx.stroke()}}
else if(G.charId==='gunslinger'){ctx.rotate(Math.PI/4);ctx.fillRect(-ch.size/2,-ch.size/2,ch.size,ch.size)}
else{ctx.rotate(G.facing);ctx.beginPath();ctx.moveTo(ch.size/2,0);ctx.lineTo(-ch.size/2,-ch.size/2);ctx.lineTo(-ch.size/2,ch.size/2);ctx.closePath();ctx.fill()}
ctx.restore();
// Ult active indicator
if(G.ultActive){ctx.strokeStyle=ch.color;ctx.lineWidth=2;ctx.globalAlpha=0.5+0.3*Math.sin(Date.now()/100);ctx.beginPath();ctx.arc(G.px,G.py,ch.size,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}
}

function renderOrbitalShield(){
if(G.orbitalOrbs.length===0)return;
for(const orb of G.orbitalOrbs){
const ox=G.px+Math.cos(orb.angle)*50,oy=G.py+Math.sin(orb.angle)*50;
ctx.fillStyle='#4488ff';ctx.beginPath();ctx.arc(ox,oy,5,0,Math.PI*2);ctx.fill()
}
}

function renderParticles(){
const rings=[],arcs=[],dots={};
for(const p of G.particles){ctx.globalAlpha=clamp(p.alpha,0,1);
if(p.isRing)rings.push(p);else if(p.isArc)arcs.push(p);else if(p.isAfterimage){ctx.fillStyle=p.color;ctx.globalAlpha=clamp(p.alpha*0.5,0,0.5);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.facing);ctx.beginPath();ctx.moveTo(p.size/2,0);ctx.lineTo(-p.size/2,-p.size/2);ctx.lineTo(-p.size/2,p.size/2);ctx.closePath();ctx.fill();ctx.restore()}
else{const k=p.color;(dots[k]||(dots[k]=[])).push(p)}}
ctx.lineWidth=3;for(const p of rings){const cs=p.expandRate?p.size+p.expandRate*(1-p.lifetime/p.maxLifetime):p.size;ctx.globalAlpha=clamp(p.alpha,0,1);ctx.strokeStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,cs,0,Math.PI*2);ctx.stroke()}
ctx.lineWidth=1.5;for(const p of arcs){ctx.globalAlpha=clamp(p.alpha,0,1);ctx.strokeStyle=p.color;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.tx,p.ty);ctx.stroke()}
for(const color in dots){ctx.fillStyle=color;ctx.beginPath();for(const p of dots[color]){ctx.globalAlpha=clamp(p.alpha,0,1);ctx.moveTo(Math.round(p.x)+p.size/2,Math.round(p.y));ctx.arc(Math.round(p.x),Math.round(p.y),p.size/2,0,Math.PI*2)}ctx.fill()}
ctx.globalAlpha=1;
// Floating texts
for(const ft of G.floatingTexts){ctx.globalAlpha=clamp(ft.lifetime/ft.maxLifetime,0,1);ctx.fillStyle=ft.color;ctx.font=`bold ${ft.size}px sans-serif`;ctx.textAlign='center';ctx.fillText(ft.text,ft.x,ft.y)}
ctx.globalAlpha=1
}

function renderHUD(){
const mob=isMobile;
// Scale factor for small screens
const s=Math.min(canvas.width,canvas.height)<500?0.75:1;
// HP bar
const hpW=180*s,hpH=16*s,hpX=15,hpY=mob?55:15;
ctx.fillStyle='#333';ctx.fillRect(hpX,hpY,hpW,hpH);
const hpPct=clamp(G.hp/G.maxHP,0,1);ctx.fillStyle=hpPct>0.5?'#44cc44':hpPct>0.25?'#cccc44':'#cc4444';
ctx.fillRect(hpX,hpY,hpW*hpPct,hpH);ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(hpX,hpY,hpW,hpH);
ctx.fillStyle='#fff';ctx.font=`${12*s}px sans-serif`;ctx.textAlign='left';ctx.fillText(`${Math.ceil(G.hp)} / ${G.maxHP}`,hpX+4,hpY+12*s);
// Timer + wave
ctx.textAlign='center';ctx.font=`${14*s}px sans-serif`;
const mins=Math.floor(G.gameTime/60),secs=Math.floor(G.gameTime%60);
ctx.fillStyle='#ccc';
const w=G.waveNumber||1;
ctx.fillText(`${t('stage')} ${G.stage} - ${t('wave')} ${w}/${G.totalWaves} - ${mins}:${secs.toString().padStart(2,'0')}`,canvas.width/2,mob?20:25);
ctx.fillStyle='#888';ctx.font=`${11*s}px sans-serif`;
const alive=G.enemies.filter(e=>!e.dead).length;
const killPct=G.waveKillTarget>0?Math.min(100,Math.round(G.waveKillCount/G.waveKillTarget*100)):0;
ctx.fillText(`${t('enemies')}: ${alive} | ${G.waveKillCount}/${G.waveKillTarget} (${killPct}%)`,canvas.width/2,mob?38:42);
// Gold + Level
ctx.textAlign='right';ctx.font=`${14*s}px sans-serif`;
const goldX=canvas.width-15;
ctx.fillStyle='#ffcc00';ctx.fillText(`${t('gold')}: ${G.gold}${G.goldCapReached?' ('+t('goldCap')+')':''}`,goldX,mob?20:20);
ctx.fillStyle='#ccc';ctx.fillText(`${t('level')} ${G.level}`,goldX,mob?38:38);
const xpW=120*s,xpH=6,xpX=goldX-xpW,xpY=mob?44:44;ctx.fillStyle='#333';ctx.fillRect(xpX,xpY,xpW,xpH);
ctx.fillStyle='#4488ff';ctx.fillRect(xpX,xpY,xpW*clamp(G.xp/G.xpToNext,0,1),xpH);
// Active power-up
if(G.activePowerUp){const pu=G.activePowerUp.type;
ctx.fillStyle=pu.color;ctx.font=`${12*s}px sans-serif`;ctx.textAlign='left';ctx.fillText(pu.icon+' '+Math.ceil(G.activePowerUp.remaining)+'s',15,mob?72:45)}
// Ultimate button — position differs for mobile
const ultR=mob?30*s:22;
const ultX=mob?canvas.width-60:canvas.width/2;
const ultY=mob?canvas.height-70:canvas.height-50;
const ultMaxCD=G.charDef.ultCD*(G.ultCDMult||1);
const ultCDPct=G.ultCDTimer>0?clamp(G.ultCDTimer/ultMaxCD,0,1):0;
ctx.fillStyle='#222';ctx.beginPath();ctx.arc(ultX,ultY,ultR,0,Math.PI*2);ctx.fill();
if(ultCDPct>0){ctx.fillStyle='#444';ctx.beginPath();ctx.moveTo(ultX,ultY);ctx.arc(ultX,ultY,ultR,-Math.PI/2,-Math.PI/2+Math.PI*2*ultCDPct);ctx.closePath();ctx.fill()}
ctx.strokeStyle=G.ultCDTimer<=0?'#ffcc00':'#555';ctx.lineWidth=mob?2:1;ctx.beginPath();ctx.arc(ultX,ultY,ultR,0,Math.PI*2);ctx.stroke();
ctx.fillStyle=G.ultActive?CHARS[G.charId].color:(G.ultCDTimer<=0?'#ffcc00':'#888');ctx.font=`bold ${mob?13*s:10}px sans-serif`;ctx.textAlign='center';
ctx.fillText(G.ultActive?t('active'):(G.ultCDTimer<=0?t('ready'):Math.ceil(G.ultCDTimer)+'s'),ultX,ultY+4*s);
// Minimap — hide on very small screens
if(canvas.width>400){
const mw=(mob?70:100)*s,mh=mw,mx=canvas.width-mw-10,my=canvas.height-mh-(mob?140:10);const ms2=mw/(ARENA_R*2);
ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(mx,my,mw,mh);ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
ctx.fillStyle='#fff';ctx.fillRect(mx+mw/2-2,my+mh/2-2,4,4);ctx.fillStyle='#cc3333';
for(const e of G.enemies){if(e.dead)continue;const dx2=(e.x-G.px)*ms2,dy2=(e.y-G.py)*ms2;if(Math.abs(dx2)<mw/2&&Math.abs(dy2)<mh/2){if(e.isBoss){ctx.fillStyle=Math.sin(Date.now()/200)>0?'#ff0000':'#880000';ctx.fillRect(mx+mw/2+dx2-3,my+mh/2+dy2-3,6,6);ctx.fillStyle='#cc3333'}else ctx.fillRect(mx+mw/2+dx2-0.5,my+mh/2+dy2-0.5,1,1)}}
}
// Combo
if(G.comboCount>=3){ctx.fillStyle='#ff8800';ctx.font=`bold ${Math.min(24+G.comboCount,40)*s}px sans-serif`;ctx.textAlign='center';ctx.fillText(G.comboCount+'x COMBO',canvas.width/2,canvas.height-(mob?140:80))}
// Mobile: virtual joystick + pause button
if(mob){
// Joystick base
const jbx=80,jby=canvas.height-100;
ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc(jbx,jby,JOY_RADIUS,0,Math.PI*2);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(jbx,jby,JOY_RADIUS,0,Math.PI*2);ctx.stroke();
// Joystick thumb
if(joyActive&&joyOrigin){
const thumbX=jbx+joyDir.x*JOY_RADIUS*0.7,thumbY=jby+joyDir.y*JOY_RADIUS*0.7;
ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(thumbX,thumbY,22,0,Math.PI*2);ctx.fill()
}else{
ctx.fillStyle='rgba(255,255,255,0.12)';ctx.beginPath();ctx.arc(jbx,jby,22,0,Math.PI*2);ctx.fill()
}
// Pause button (top-right)
ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(canvas.width-44,8,36,36);
ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(canvas.width-38,18,8,16);ctx.fillRect(canvas.width-26,18,8,16)
}
}

function renderBossHP(){
const bw=canvas.width-40,bh=10,bx=20,by=55;
ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);ctx.fillStyle='#cc3333';ctx.fillRect(bx,by,bw*G.bossHPPercent,bh);
ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText(t('boss')+': '+t('bossNames')[G.stage-1],canvas.width/2,by-3)
}

// ==================== GAME LOOP ====================
let lastTime=0;
function gameLoop(ts){
requestAnimationFrame(gameLoop);
const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
fpsCnt++;fpsT+=dt;if(fpsT>=1){fpsVal=fpsCnt;fpsCnt=0;fpsT-=1}
if(G&&screen==='inGame'&&!G.paused&&!G.runOver){
G.hazardSlow=0;updatePlayer(dt);updateSpawn(dt);updateEnemies(dt);updateCollisions();
updateAutoAttack(dt);updateUlt(dt);updateProjectiles(dt);updateXPOrbs(dt);updateAfterimages(dt);
updateParticles(dt);updateHazards(dt);updatePowerUps(dt);updateStage(dt);
G.spatial.clear();for(const e of G.enemies)if(!e.dead)G.spatial.insert(e);
// Orbital shield update
for(const orb of G.orbitalOrbs){orb.angle+=2*dt;
const ox=G.px+Math.cos(orb.angle)*50,oy=G.py+Math.sin(orb.angle)*50;
const near=G.spatial.query(ox,oy,10);for(const e of near){if(e.isEnemy&&!e.dead&&dist(e.x,e.y,ox,oy)<10){
const eid=G.enemies.indexOf(e);if(eid>=0&&(!orb.cd[eid]||orb.cd[eid]<=0)){orb.cd[eid]=1.5;damageEnemy(e,6,false)}}}
for(const k in orb.cd){orb.cd[k]-=dt;if(orb.cd[k]<=0)delete orb.cd[k]}}
// Combo timer
if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0){G.comboCount=0;G.comboStep=0}}
}
render()
}
// ==================== INPUT ====================
window.addEventListener('keydown',e=>{
keys.add(e.code);
if(e.code==='Space'){e.preventDefault();if(G&&screen==='inGame')activateUlt()}
if(e.code==='Escape'){e.preventDefault();if(G&&screen==='inGame'){G.paused=true;switchScreen('pause')}}
});
window.addEventListener('keyup',e=>keys.delete(e.code));

// ==================== MOBILE TOUCH ====================
const isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;

// Virtual joystick state
let joyTouchId=null,joyOrigin=null,joyDir={x:0,y:0},joyActive=false;
const JOY_RADIUS=50,JOY_DEAD=8;

// Button touch state
let btnTouchId=null;

function handleTouchStart(e){
e.preventDefault();
for(let i=0;i<e.changedTouches.length;i++){
const t=e.changedTouches[i];
const x=t.clientX,y=t.clientY;
const isRight=x>window.innerWidth*0.6;
if(!isRight&&joyTouchId===null){
// Left side: joystick
joyTouchId=t.identifier;joyOrigin={x,y};joyActive=true;joyDir={x:0,y:0}
}else if(isRight&&btnTouchId===null){
// Right side: buttons
btnTouchId=t.identifier;
checkMobileButtons(x,y)
}
}
}

function handleTouchMove(e){
e.preventDefault();
for(let i=0;i<e.changedTouches.length;i++){
const t=e.changedTouches[i];
if(t.identifier===joyTouchId&&joyOrigin){
const dx=t.clientX-joyOrigin.x,dy=t.clientY-joyOrigin.y;
const len=Math.hypot(dx,dy);
if(len>JOY_DEAD){
const clampedLen=Math.min(len,JOY_RADIUS);
joyDir={x:dx/Math.max(1,len),y:dy/Math.max(1,len)};
const ratio=clampedLen/JOY_RADIUS;
keys.clear();
if(joyDir.x<-0.25)keys.add('KeyA');if(joyDir.x>0.25)keys.add('KeyD');
if(joyDir.y<-0.25)keys.add('KeyW');if(joyDir.y>0.25)keys.add('KeyS');
}else{joyDir={x:0,y:0};keys.clear()}
}
}
}

function handleTouchEnd(e){
e.preventDefault();
for(let i=0;i<e.changedTouches.length;i++){
const t=e.changedTouches[i];
if(t.identifier===joyTouchId){
joyTouchId=null;joyOrigin=null;joyActive=false;joyDir={x:0,y:0};keys.clear()
}
if(t.identifier===btnTouchId)btnTouchId=null
}
}

function checkMobileButtons(x,y){
if(!G||screen!=='inGame')return;
const w=window.innerWidth,h=window.innerHeight;
// Ult button: bottom-right area
const ultX=w-60,ultY=h-70,ultR=30;
if(Math.hypot(x-ultX,y-ultY)<ultR*1.5){activateUlt();return}
// Pause button: top-right corner
if(x>w-50&&y<50){G.paused=true;switchScreen('pause')}
}

// Bind touch events
if(isMobile){
canvas.addEventListener('touchstart',handleTouchStart,{passive:false});
canvas.addEventListener('touchmove',handleTouchMove,{passive:false});
canvas.addEventListener('touchend',handleTouchEnd,{passive:false});
canvas.addEventListener('touchcancel',handleTouchEnd,{passive:false})
}

// ==================== UI REFRESH ====================

const b=document.getElementById('startBtn');if(b)b.textContent=t('startGame');
const sb=document.getElementById('shopBtn');if(sb)sb.textContent=t('shop');
const sub=document.getElementById('titleSub');if(sub)sub.textContent='SURVIVOR';
const cst=document.getElementById('charTitle');if(cst)cst.textContent=t('chooseSurvivor');
const st=document.getElementById('shopTitle');if(st)st.textContent=t('permanentUpgrades');
const sst=document.getElementById('stageTitle');if(sst)sst.textContent=t('selectStage');
const lut=document.getElementById('luTitle');if(lut)lut.textContent=t('levelUp');
const pt=document.getElementById('pauseTitle');if(pt)pt.textContent=t('paused');
const rb=document.getElementById('resumeBtn');if(rb)rb.textContent=t('resume');
const rsb=document.getElementById('restartBtn');if(rsb)rsb.textContent=t('restart');

}

</script>
