// ==================== START RUN ====================
function startRun(stageNum) {
    if (!selectedCharId) { switchScreen('characterSelect'); return; }
    game = createRunState(selectedCharId, stageNum);
    if (game.level > 0) {
        for (let i = 0; i < game.level; i++) applyRandomUpgradeSilent();
        game.xpToNext = 8 * (game.level + 1);
    }
    // Init orbital orbs
    if (game.orbitalShield > 0) initOrbitalOrbs();
    // Starter Pack
    const starterPacks = saveData.upgrades.starterPack || 0;
    for (let i = 0; i < starterPacks; i++) applyRandomUpgradeSilent();
    switchScreen('inGame');
}

function applyRandomUpgradeSilent() {
    const available = UPGRADES.filter(u => !u.charReq || u.charReq === game.charId);
    const pick = available[randInt(0, available.length - 1)];
    pick.apply(game);
}

function initOrbitalOrbs() {
    game.orbitalOrbs = [];
    const count = game.orbitalShield;
    for (let i = 0; i < count; i++) {
        game.orbitalOrbs.push({ angle: (Math.PI * 2 / count) * i, cd: {} });
    }
}

// ==================== PAUSE ====================
function togglePause() { if (game.paused) resumeGame(); else { game.paused = true; switchScreen('pause'); } }
function resumeGame() { touchActive = false; touchDir.x = 0; touchDir.y = 0; game.paused = false; switchScreen('inGame'); }
function restartRun() { touchActive = false; touchDir.x = 0; touchDir.y = 0; startRun(game.stage); }
function quitToShop() { saveData.gold += Math.floor(game.totalGoldEarned); saveData.totalRuns++; saveSave(); game = null; switchScreen('shop'); }

// ==================== LEVEL UP ====================
function showLevelUp() {
    game.paused = true;
    const available = UPGRADES.filter(u => !u.charReq || u.charReq === game.charId);
    const picks = [];
    const pool = [...available];
    const isRareLevel = (game.level % 5 === 0 && game.level <= 25);

    for (let i = 0; i < 3 && pool.length > 0; i++) {
        const roll = Math.random();
        let cat;
        if (roll < 0.30) cat = 'off';
        else if (roll < 0.55) cat = 'def';
        else if (roll < 0.75) cat = 'util';
        else if (roll < 0.90) cat = 'spec';
        else cat = 'char';

        const catPool = pool.filter(u => u.cat === cat);
        const usePool = catPool.length > 0 ? catPool : pool;
        const totalWeight = usePool.reduce((s, u) => s + u.weight, 0);
        let r = Math.random() * totalWeight;
        let pick = usePool[0];
        for (const u of usePool) { r -= u.weight; if (r <= 0) { pick = u; break; } }

        const isRare = isRareLevel && i === 0;
        picks.push({ ...pick, rare: isRare });
        const idx = pool.indexOf(pick);
        if (idx >= 0) pool.splice(idx, 1);
    }

    const cont = document.getElementById('upgradeCards');
    cont.innerHTML = '';
    document.getElementById('levelUpTitle').textContent = t('levelUp');

    picks.forEach(pick => {
        const card = document.createElement('div');
        card.className = 'upgrade-card' + (pick.rare ? ' rare' : '');
        let desc = t(pick.id + 'Desc');
        if (pick.rare) {
            desc = desc.replace(/(\+?)(\d+\.?\d*)(%?)/g, (m, plus, ns, pct) => {
                const n = parseFloat(ns); return isNaN(n) ? m : (plus||'') + (n*2) + (pct||'');
            });
        }
        card.innerHTML = `<div class="icon">${pick.icon || ''}</div><h4>${t(pick.id)}</h4><div class="desc">${desc}</div>${pick.rare ? '<div class="rarity-label">'+t('rare2x')+'</div>' : ''}`;
        card.onclick = () => {
            if (pick.rare) { pick.apply(game); pick.apply(game); }
            else { pick.apply(game); }
            if (game.orbitalShield > 0 && game.orbitalOrbs.length === 0) initOrbitalOrbs();
            if (game.pendingLevelUps > 0) {
                game.pendingLevelUps--;
                showLevelUp();
            } else {
                game.paused = false;
                switchScreen('inGame');
            }
        };
        cont.appendChild(card);
    });

    switchScreen('levelUp');
}

// ==================== ULTIMATE (NERFED) ====================
function activateUltimate() {
    if (!game || game.ultCDTimer > 0 || game.ultActive) return;
    const ch = game.charDef;
    game.ultActive = true;
    game.ultTimer = game.ultDuration || ch.ultDuration;
    game.ultSpecialTimer = 0;
    game.ultCDTimer = (game.ultDuration ? ch.ultCD : ch.ultCD) * (game.ultCDMult || 1);
    game.screenShake = 0.2; game.screenShakeIntensity = 5;
    game.screenFlash = 0.15; game.screenFlashColor = ch.color;
    for (let i = 0; i < 20; i++) { const a2 = (Math.PI * 2 / 20) * i; game.particles.push({ x: game.px, y: game.py, dx: Math.cos(a2) * 150, dy: Math.sin(a2) * 150, lifetime: 0.5, maxLifetime: 0.5, size: 4, color: ch.color, alpha: 0.8 }); }

    if (game.charId === 'shadow') {
        const numClones = game.ultClones || ch.ultClones;
        game.clones = [];
        for (let i = 0; i < numClones; i++) {
            game.clones.push({ x: game.px + rand(-30, 30), y: game.py + rand(-30, 30), timer: game.ultDuration || ch.ultDuration, cdTimer: 0 });
        }
    }
}

// ==================== SPAWN SYSTEM (8-segment perimeter) ====================
function getSpawnInterval() {
    const t = game.gameTime;
    if (t < 180) return lerp(0.5, 0.15, t / 180);
    return lerp(0.15, 0.08, (t - 180) / 60);
}

function getSpawnPositions(count) {
    // Spawn from arena edge
    const positions = [];
    const numPoints = randInt(2, 4);
    for (let i = 0; i < numPoints; i++) {
        const angle = rand(0, Math.PI * 2);
        const pos = { x: Math.cos(angle) * (ARENA_RADIUS + 30), y: Math.sin(angle) * (ARENA_RADIUS + 30) };
        let valid = true;
        for (const p of positions) {
            if (distXY(p.x, p.y, pos.x, pos.y) < 60) { valid = false; break; }
        }
        if (valid) positions.push(pos);
    }
    return positions;
}

function spawnNormalEnemy() {
    if (game.enemies.length >= MAX_ENEMIES_SOFT) return;
    const r = Math.random();
    let type;
    const swarmerRatio = lerp(0.2, 0.4, game.gameTime / 300);
    const runnerRatio = lerp(0.3, 0.2, game.gameTime / 300);
    if (r < swarmerRatio) type = 'swarmer';
    else if (r < swarmerRatio + runnerRatio) type = 'runner';
    else type = 'walker';

    const diffMult = game.stageDef.diffMult;
    const positions = getSpawnPositions(1);
    if (positions.length === 0) return;
    const pos = positions[0];
    const count = type === 'swarmer' ? randInt(10, 15) : type === 'runner' ? randInt(5, 8) : 1;
    for (let i = 0; i < count && game.enemies.length < MAX_ENEMIES_HARD; i++) {
        game.enemies.push(createEnemy(type, pos.x + rand(-20, 20), pos.y + rand(-20, 20), diffMult));
    }
}

function spawnSpecialEnemy() {
    if (game.enemies.length >= MAX_ENEMIES_HARD) return;
    const specials = ['spitter', 'bomber', 'shielder', 'healer', 'flanker', 'charger'];
    const type = specials[randInt(0, specials.length - 1)];
    const diffMult = game.stageDef.diffMult;
    const positions = getSpawnPositions(1);
    if (positions.length === 0) return;
    game.enemies.push(createEnemy(type, positions[0].x, positions[0].y, diffMult));
}

function spawnBoss() {
    if (game.bossSpawned) return;
    game.bossSpawned = true;
    const bossKeys = ['colossus','necromancer','hiveQueen','warlord','plagueDoctor','abyssKing'];
    const bKey = bossKeys[game.stage - 1];
    const def = BOSS_DEFS[bKey];
    const pos = getSpawnPositions(1)[0] || { x: game.px + 200, y: game.py };
    const diffMult = game.stageDef.diffMult;

    const boss = {
        type: bKey, x: pos.x, y: pos.y,
        hp: def.hp * diffMult, maxHp: def.hp * diffMult,
        speed: def.speed, damage: def.damage * diffMult,
        size: def.size, color: def.color,
        gold: def.gold + game.stage * 25, xp: 50,
        special: false, facing: 0, specialTimer: 0, flashTimer: 0,
        isBoss: true, bossPhase: 0, healPulseTimer: 0, contactCD: 0,
        dead: false, isEnemy: true, fadeIn: 0,
        // Boss-specific timers
        slamTimer: 5, summonTimer: 10, summonAlt: false,
        orbTimer: 3, teleportCD: 0,
        chargeTimer: bKey === 'warlord' ? 4 : (bKey === 'hiveQueen' ? 6 : 0),
        chargeDir: 0, isCharging: false, chargeDur: 0,
        // Warlord
        commandAuraRange: 120,
        // Plague Doctor
        flaskTimer: 3, curseTimer: 8, poisonClouds: [],
        // Abyss King
        beamTimer: 6, beamAngle: 0, beamActive: false, beamDur: 0,
        riftTimer: 12, rifts: [],
        shieldHP: 0, shieldRegenTimer: 0,
        burnTimer: 0
    };
    game.boss = boss;
    game.enemies.push(boss);
    game.screenShake = 0.5; game.screenShakeIntensity = 8;
    game.screenFlash = 0.2; game.screenFlashColor = '#cc0000';
    addFloatingText(game.px, game.py - 40, t('bossIncoming'), '#ff3333', 24);
}

// ==================== DAMAGE / COMBAT ====================
function damageEnemy(enemy, dmg, forceCrit) {
    if (enemy.dead) return;
    if (enemy.type === 'shielder' && !enemy.isBoss && enemy.shieldHP > 0) {
        const ang = angleXY(enemy.x, enemy.y, game.px, game.py);
        if (Math.abs(angleDiff(ang, enemy.facing)) < Math.PI / 2) {
            const shieldDmg = Math.min(enemy.shieldHP, dmg);
            enemy.shieldHP -= shieldDmg;
            dmg -= shieldDmg;
            if (dmg <= 0) { addFloatingText(enemy.x, enemy.y - enemy.size, 'BLOCKED', '#888', 10); return; }
        }
    }
    if (enemy.type === 'necromancer' && enemy.isBoss && dmg > 50 && enemy.teleportCD <= 0) {
        enemy.x = game.px + rand(-300, 300);
        enemy.y = game.py + rand(-300, 300);
        enemy.teleportCD = 3;
        addFloatingText(enemy.x, enemy.y - 20, t('teleport'), '#9966ff', 14);
        return;
    }

    const isCrit = forceCrit || Math.random() < game.crit;
    let finalDmg = isCrit ? dmg * game.critDmg : dmg;
    if (enemy.isBoss && game.giantSlayer > 0) finalDmg *= (1 + game.giantSlayer);
    // Weaken curse (Plague Doctor)
    finalDmg *= game.weakenMult;
    // Berserker: lower HP = higher ATK
    if (game.berserker) { finalDmg *= (1 + (1 - game.hp / game.maxHP) * 0.5); }

    finalDmg = Math.max(1, Math.round(finalDmg));

    enemy.hp -= finalDmg;
    enemy.flashTimer = 0.1;

    const sparkCount = isCrit ? 5 : 3;
    for (let i = 0; i < sparkCount; i++) {
        game.particles.push({ x: enemy.x, y: enemy.y, dx: rand(-100, 100), dy: rand(-100, 100), lifetime: 0.2, maxLifetime: 0.2, size: isCrit ? 3 : 2, color: isCrit ? '#ffcc00' : '#ffffff', alpha: 1 });
    }
    if (isCrit) { game.screenShake = Math.max(game.screenShake || 0, 0.1); game.screenShakeIntensity = Math.max(game.screenShakeIntensity || 0, 4); }

    addFloatingText(enemy.x, enemy.y - enemy.size, (isCrit ? 'CRIT ' : '') + finalDmg, isCrit ? '#ffcc00' : '#fff', isCrit ? 18 : 12);

    // Life steal
    if (game.lifeSteal > 0) game.hp = Math.min(game.maxHP, game.hp + finalDmg * game.lifeSteal);

    // Chain lightning
    if (game.chainLightning && Math.random() < game.chainChance) {
        const nearby = game.spatialHash.query(enemy.x, enemy.y, 80);
        for (const ne of nearby) {
            if (ne.isEnemy && !ne.dead && ne !== enemy && distXY(ne.x, ne.y, enemy.x, enemy.y) < 80) {
                const chainDmg = Math.round(finalDmg * game.chainDmgMult);
                damageEnemy(ne, chainDmg, false);
                addFloatingText(ne.x, ne.y - ne.size, chainDmg, '#88ccff', 10);
                // Lightning arc visual
                game.particles.push({ x: enemy.x, y: enemy.y, dx: 0, dy: 0, lifetime: 0.15, maxLifetime: 0.15, size: 2, color: '#ffff44', alpha: 1, isArc: true, tx: ne.x, ty: ne.y });
                if (ne.hp <= 0) killEnemy(ne);
                break;
            }
        }
    }

    // Burning strikes
    if (game.burningStrikes) enemy.burnTimer = 3;

    // Thorns (reflected from player - not applicable here, thorns is on player)
    if (enemy.hp <= 0) killEnemy(enemy);
}

function killEnemy(enemy) {
    if (enemy.dead) return;
    enemy.dead = true;
    const stageGoldMult = 1 + 0.2 * (game.stage - 1);
    const effectiveGoldMult = Math.min(3, stageGoldMult * (game.goldMult || 1));
    let goldAmt = Math.round(enemy.gold * effectiveGoldMult);
    // Fortune
    if (game.fortune > 0 && Math.random() < game.fortune) goldAmt *= 2;
    game.gold += goldAmt; game.totalGoldEarned += goldAmt;
    addFloatingText(enemy.x, enemy.y - enemy.size - 10, '+' + goldAmt + 'g', '#ffcc00', 11);
    const stageXPMult = 1 + 0.3 * (game.stage - 1);
    game.xpOrbs.push({ x: enemy.x, y: enemy.y, xp: Math.round(enemy.xp * stageXPMult), lifetime: 30 });

    if (enemy.type === 'bomber' && !enemy.isBoss)
        game.explosions.push({ x: enemy.x, y: enemy.y, timer: 0.5, radius: 60, damage: enemy.damage });

    for (let i = 0; i < randInt(3, 5); i++)
        game.particles.push({ x: enemy.x, y: enemy.y, dx: rand(-60, 60), dy: rand(-60, 60), lifetime: 0.4, maxLifetime: 0.4, size: rand(2, 4), color: enemy.color, alpha: 1 });

    if (game.poisonCloud) game.poisonClouds.push({ x: enemy.x, y: enemy.y, lifetime: 3, radius: 30, damage: game.atk * 0.3, tickTimer: 0 });

    game.kills++;
    // Combo counter
    game.comboCount++;
    game.comboTimer = 3;
    if (game.comboCount === 10 || game.comboCount === 20 || game.comboCount === 30) {
        const bonusXP = game.comboCount * 2;
        game.xpOrbs.push({ x: game.px, y: game.py, xp: bonusXP, lifetime: 30 });
        addFloatingText(game.px, game.py - 50, game.comboCount + 'x COMBO!', '#ff8800', 22);
    }
    if (enemy.isBoss) {
        game.bossDefeated = true; game.boss = null;
        addFloatingText(game.px, game.py - 60, t('bossDefeated'), '#ffcc00', 28);
        for (let i = 0; i < 5; i++) game.xpOrbs.push({ x: enemy.x + rand(-20, 20), y: enemy.y + rand(-20, 20), xp: 10, lifetime: 30 });
    }
}

function damagePlayer(dmg, source) {
    if (game.iFrames > 0) return;
    if (game.iFrames > 0) return;
    if (game.charId === 'guardian' && game.ultActive) { addFloatingText(game.px, game.py - 20, t('invulnerable'), '#4488cc', 14); return; }
    if ((game.dodgeChance || 0) > 0 && Math.random() < game.dodgeChance) { addFloatingText(game.px, game.py - 20, t('dodge'), '#88ccff', 14); return; }
    if (game.charId === 'shadow' && game.ultActive && Math.random() < (CHARS.shadow.ultDodge || 0.3)) {
        addFloatingText(game.px, game.py - 20, t('dodge'), '#bb66ff', 14);
        return;
    }
    if (game.hasShield && game.shieldReady) { game.shieldReady = false; game.shieldTimer = game.shieldCD; addFloatingText(game.px, game.py - 20, t('blocked'), '#88ccff', 14); return; }

    let dr = 0;
    if (game.charId === 'guardian') {
        const nearby = game.spatialHash.query(game.px, game.py, 100);
        let count = 0;
        for (const e of nearby) if (e.isEnemy && !e.dead && distXY(e.x, e.y, game.px, game.py) < 100) count++;
        dr = Math.min(0.3, count * 0.03);
    }

    let finalDmg = Math.max(1, dmg - (game.armor || 0));
    finalDmg = Math.round(finalDmg * (1 - dr));
    finalDmg = Math.max(1, finalDmg);

    game.hp -= finalDmg;
    game.screenShake = 0.15; game.screenShakeIntensity = 3; game.iFrames = 0.25;
    addFloatingText(game.px, game.py - 15, '-' + finalDmg, '#ff4444', 14);

    for (let i = 0; i < 4; i++) { game.particles.push({ x: game.px, y: game.py, dx: rand(-80, 80), dy: rand(-80, 80), lifetime: 0.3, maxLifetime: 0.3, size: rand(2, 4), color: '#cc2222', alpha: 0.8 }); }

    // Thorns
    if (game.thorns > 0 && source && !source.dead) {
        const thornsDmg = Math.round(finalDmg * game.thorns);
        source.hp -= thornsDmg; source.flashTimer = 0.1;
        if (source.hp <= 0 && !source.dead) killEnemy(source);
    }

    if (game.hp <= 0) {
        if ((game.secondWind || 0) > 0) {
            game.secondWind--;
            game.hp = Math.floor(game.maxHP * 0.3);
            game.iFrames = 1.0;
            addFloatingText(game.px, game.py - 30, 'SECOND WIND!', '#44ff44', 20);
            game.screenFlash = 0.2; game.screenFlashColor = '#44ff44';
        } else {
            game.hp = 0; game.stageFailed = true; game.runOver = true; endRun(false);
        }
    }
}

function addFloatingText(x, y, text, color, size) { game.floatingTexts.push({ x, y, text, color, size: size || 12, lifetime: 0.8, maxLifetime: 0.8 }); }

// ==================== UPDATE: PLAYER ====================
function updatePlayer(dt) {
    if (game.iFrames > 0) game.iFrames -= dt;
    if (game.stunTimer > 0) { game.stunTimer -= dt; return; /* can't move or attack while stunned */ }

    // Movement
    let dx = 0, dy = 0;
    if (keys.has('KeyW') || keys.has('ArrowUp')) dy -= 1;
    if (keys.has('KeyS') || keys.has('ArrowDown')) dy += 1;
    if (keys.has('KeyA') || keys.has('ArrowLeft')) dx -= 1;
    if (keys.has('KeyD') || keys.has('ArrowRight')) dx += 1;
    // Touch: override keyboard direction if active
    if (touchActive && (touchDir.x !== 0 || touchDir.y !== 0)) { dx = touchDir.x; dy = touchDir.y; }

    if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy); dx /= len; dy /= len;
        game.px += dx * game.spd * 60 * dt;
        game.py += dy * game.spd * 60 * dt;
        game.facing = Math.atan2(dy, dx);
        if (game.spd > 2.5) game.particles.push({ x: game.px + rand(-3, 3), y: game.py + rand(-3, 3), dx: 0, dy: 0, lifetime: 0.15, maxLifetime: 0.15, size: game.charDef.size * 0.3, color: game.charDef.color, alpha: 0.3 });
        // Frozen trail
        if (game.frozenTrail) game.frozenTrailSegs.push({ x: game.px, y: game.py, lifetime: 2 });
    }

    // Arena boundary
    const distFromCenter = Math.hypot(game.px, game.py);
    game.arenaWarning = distFromCenter > ARENA_RADIUS * 0.85;
    if (distFromCenter > ARENA_RADIUS) {
        const pushAngle = Math.atan2(game.py, game.px);
        const overflow = distFromCenter - ARENA_RADIUS;
        const pushForce = Math.max(overflow * 0.3, 2);
        game.px -= Math.cos(pushAngle) * pushForce * 60 * dt;
        game.py -= Math.sin(pushAngle) * pushForce * 60 * dt;
    }

    if (game.hpRegen > 0) game.hp = Math.min(game.maxHP, game.hp + game.hpRegen * dt);
    // Combo timer
    if (game.comboTimer > 0) { game.comboTimer -= dt; if (game.comboTimer <= 0) game.comboCount = 0; }
    // Vampiric Aura
    if (game.vampiricAura) {
        game.vampiricAuraTimer -= dt;
        if (game.vampiricAuraTimer <= 0) {
            game.vampiricAuraTimer = 2;
            const nearby = game.spatialHash.query(game.px, game.py, game.vampiricAuraRange);
            for (const e of nearby) {
                if (e.isEnemy && !e.dead && distXY(e.x, e.y, game.px, game.py) < game.vampiricAuraRange) {
                    game.hp = Math.min(game.maxHP, game.hp + game.atk * game.vampiricAuraHeal);
                    break;
                }
            }
        }
    }
    // Time Warp
    if (game.timeWarp) { game.timeWarpActive = game.hp / game.maxHP < game.timeWarpThreshold; }
    // Frost Nova
    if (game.frostNova) {
        game.frostNovaTimer -= dt;
        if (game.frostNovaTimer <= 0) {
            game.frostNovaTimer = game.frostNovaCD;
            const nearby = game.spatialHash.query(game.px, game.py, game.frostNovaRange);
            for (const e of nearby) {
                if (e.isEnemy && !e.dead && distXY(e.x, e.y, game.px, game.py) < game.frostNovaRange) e.frozenTimer = 1.5;
            }
            for (let i = 0; i < 12; i++) { const a2 = (Math.PI * 2 / 12) * i; game.particles.push({ x: game.px, y: game.py, dx: Math.cos(a2) * 80, dy: Math.sin(a2) * 80, lifetime: 0.3, maxLifetime: 0.3, size: 4, color: '#88ccff', alpha: 0.8 }); }
        }
    }
    if (game.hasShield && !game.shieldReady && game.shieldTimer > 0) { game.shieldTimer -= dt; if (game.shieldTimer <= 0) game.shieldReady = true; }
    if (game.ultCDTimer > 0) game.ultCDTimer -= dt;

    // Weaken curse timer
    if (game.weakenTimer > 0) { game.weakenTimer -= dt; if (game.weakenTimer <= 0) game.weakenMult = 1; }

    // Ultimate active
    if (game.ultActive) {
        game.ultTimer -= dt;
        if (game.ultTimer <= 0) { game.ultActive = false; game.clones = []; }
    }

    // Auto-attack: every frame, decrement cooldown, fire when ready and target in range
    const atkSpdMult = (game.charId === 'shadow' && game.ultActive) ? (game.ultAtkSpdMult || CHARS.shadow.ultAtkSpdMult) : 1;
    game.autoCDTimer -= dt * game.atkSpd * atkSpdMult;
    if (game.autoCDTimer <= 0) {
        // Find nearest enemy within attack range
        const target = findNearestEnemy(game.px, game.py, game.autoRange);
        if (target) {
            performAutoAttack(target);
            game.autoCDTimer = game.charDef.autoCD;
        }
    }

    // Clones
    for (let i = game.clones.length - 1; i >= 0; i--) {
        const clone = game.clones[i];
        clone.timer -= dt; clone.cdTimer -= dt * game.atkSpd * (game.ultAtkSpdMult || CHARS.shadow.ultAtkSpdMult);
        if (clone.cdTimer <= 0) {
            const near = findNearestEnemy(clone.x, clone.y, 150);
            if (near) { damageEnemy(near, game.atk * game.afterimageMult, false); clone.cdTimer = game.charDef.autoCD; }
        }
        if (clone.timer <= 0) game.clones.splice(i, 1);
    }

    // Afterimages
    for (let i = game.afterimages.length - 1; i >= 0; i--) {
        const a = game.afterimages[i]; a.timer -= dt;
        if (a.timer <= 0) {
            if (a.target && !a.target.dead && game.enemies.includes(a.target)) damageEnemy(a.target, game.atk * game.afterimageMult, false);
            game.afterimages.splice(i, 1);
        }
    }

    // Ultimate effects
    if (game.ultActive) {
        game.ultSpecialTimer -= dt;
        if (game.charId === 'guardian') {
            const interval = CHARS.guardian.ultShockwaveInterval;
            if (game.ultSpecialTimer <= 0) {
                game.ultSpecialTimer = interval;
                const range = game.ultShockwaveRange || CHARS.guardian.ultShockwaveRange;
                const dmg = CHARS.guardian.ultShockwaveDmg;
                const nearby = game.spatialHash.query(game.px, game.py, range);
                for (const e of nearby) {
                    if (e.isEnemy && !e.dead && distXY(e.x, e.y, game.px, game.py) < range) {
                        damageEnemy(e, dmg, false);
                        const a = angleXY(game.px, game.py, e.x, e.y);
                        e.x += Math.cos(a) * 40; e.y += Math.sin(a) * 40;
                    }
                }
                for (let i = 0; i < 16; i++) {
                    const a = (Math.PI * 2 / 16) * i;
                    game.particles.push({ x: game.px, y: game.py, dx: Math.cos(a) * 100, dy: Math.sin(a) * 100, lifetime: 0.3, maxLifetime: 0.3, size: 5, color: '#4488cc', alpha: 0.8 });
                }
            }
        } else if (game.charId === 'gunslinger') {
            const fireRate = CHARS.gunslinger.ultFireRate;
            if (game.ultSpecialTimer <= 0) {
                game.ultSpecialTimer = fireRate;
                const near = findNearestEnemy(game.px, game.py, 300);
                const baseAngle = near ? angleXY(game.px, game.py, near.x, near.y) : game.facing;
                const bulletCount = game.ultBullets || CHARS.gunslinger.ultBullets;
                const spread = 0.25;
                for (let i = 0; i < bulletCount; i++) {
                    const a = baseAngle + (i - (bulletCount - 1) / 2) * spread;
                    game.projectiles.push({ x: game.px, y: game.py, dx: Math.cos(a), dy: Math.sin(a), speed: 8, damage: game.atk, piercing: CHARS.gunslinger.ultPierce, owner: 'player', lifetime: 2 });
                }
            }
        }
        // Shadow: slow + clones handled elsewhere
    }

    // Lightning aura
    if (game.lightningAura) {
        game.lightningAuraTimer -= dt;
        if (game.lightningAuraTimer <= 0) {
            game.lightningAuraTimer = game.lightningAuraCD;
            const near = findNearestEnemy(game.px, game.py, 100);
            if (near) {
                damageEnemy(near, 10, false);
                game.particles.push({ x: game.px, y: game.py, dx: 0, dy: 0, lifetime: 0.15, maxLifetime: 0.15, size: 2, color: '#ffffff', alpha: 1, isArc: true, tx: near.x, ty: near.y });
            }
        }
    }

    // Whirlwind
    if (game.whirlwind) {
        game.whirlwindTimer -= dt;
        if (game.whirlwindTimer <= 0) {
            game.whirlwindTimer = game.whirlwindCD;
            const nearby = game.spatialHash.query(game.px, game.py, 60);
            for (const e of nearby) {
                if (e.isEnemy && !e.dead && distXY(e.x, e.y, game.px, game.py) < 60) {
                    const a = angleXY(e.x, e.y, game.px, game.py);
                    e.x += Math.cos(a) * 15; e.y += Math.sin(a) * 15;
                }
            }
        }
    }

    // Orbital shield orbs
    for (const orb of game.orbitalOrbs) {
        orb.angle += dt * 2.5;
        const ox = game.px + Math.cos(orb.angle) * 50;
        const oy = game.py + Math.sin(orb.angle) * 50;
        const nearby = game.spatialHash.query(ox, oy, 20);
        for (const e of nearby) {
            if (e.isEnemy && !e.dead && distXY(ox, oy, e.x, e.y) < e.size / 2 + 5) {
                const key = e.type + '_' + e.x.toFixed(0);
                if (!orb.cd[key] || orb.cd[key] <= 0) {
                    orb.cd[key] = 1;
                    damageEnemy(e, 8, false);
                }
            }
        }
        for (const k in orb.cd) { orb.cd[k] -= dt; if (orb.cd[k] <= 0) delete orb.cd[k]; }
    }

    // Magnet field slow handled in updateEnemies via spdMult
}

function findNearestEnemy(x, y, range) {
    const nearby = game.spatialHash.query(x, y, range);
    let best = null, bestDist2 = range * range;
    for (const e of nearby) {
        if (!e.isEnemy || e.dead) continue;
        const d2 = (e.x - x) * (e.x - x) + (e.y - y) * (e.y - y);
        if (d2 < bestDist2) { bestDist2 = d2; best = e; }
    }
    return best;
}

function performAutoAttack(target) {
    game.attackCounter++;
    const a = angleXY(game.px, game.py, target.x, target.y);
    game.attackAngle = a; game.isAttacking = true; game.attackTimer = 0.15;

    if (game.charId === 'guardian') {
        const nearby = game.spatialHash.query(game.px, game.py, game.autoRange);
        for (const e of nearby) {
            if (!e.isEnemy || e.dead) continue;
            if (distXY(e.x, e.y, game.px, game.py) > game.autoRange) continue;
            const ea = angleXY(game.px, game.py, e.x, e.y);
            if (Math.abs(angleDiff(a, ea)) < game.cleaveArc / 2) damageEnemy(e, game.atk, false);
        }
    } else if (game.charId === 'gunslinger') {
        const count = game.projCount || 1;
        const isCritShot = game.attackCounter % 5 === 0;
        for (let i = 0; i < count; i++) {
            const spread = count > 1 ? (i - (count - 1) / 2) * 0.15 : 0;
            const pa = a + spread;
            game.projectiles.push({ x: game.px, y: game.py, dx: Math.cos(pa), dy: Math.sin(pa), speed: CHARS.gunslinger.projSpeed, damage: game.atk, piercing: game.piercing || 0, owner: 'player', lifetime: 2, isCrit: isCritShot, knockback: isCritShot ? 2 : 0 });
        }
    } else if (game.charId === 'shadow') {
        const count = game.projCount || 1;
        for (let i = 0; i < count; i++) {
            const spread = count > 1 ? (i - (count - 1) / 2) * 0.12 : 0;
            const pa = a + spread;
            game.projectiles.push({
                x: game.px, y: game.py,
                dx: Math.cos(pa), dy: Math.sin(pa),
                speed: CHARS.shadow.projSpeed,
                damage: game.atk * (CHARS.shadow.shadowBladeDmg || 1.2) * (game.shadowBladeDmgMult || 1),
                piercing: game.piercing || 0,
                owner: 'player', lifetime: 0.5,
                isShadowBlade: true
            });
        }
        if (Math.random() < (CHARS.shadow.afterimageChance || 0.4)) {
            game.afterimages.push({ target: target, timer: 0.3 });
        }
    }
}

// ==================== COLLISION SEPARATION ====================
function resolveCollisions() {
    if (!game) return;
    const pSize = game.charDef.size;

    // Player-enemy separation: enemies cannot push player
    const nearP = game.spatialHash.query(game.px, game.py, pSize);
    for (const e of nearP) {
        if (!e.isEnemy || e.dead) continue;
        const d = distXY(e.x, e.y, game.px, game.py);
        const minDist = e.size / 2 + pSize / 2;
        if (d < minDist && d > 0.01) {
            const overlap = minDist - d;
            const ax = (game.px - e.x) / d;
            const ay = (game.py - e.y) / d;
            e.x -= ax * overlap;
            e.y -= ay * overlap;
        }
    }

    // Enemy-enemy separation (3 iterations)
    for (let iter = 0; iter < 3; iter++) {
        let resolved = true;
        for (const e of game.enemies) {
            if (e.dead) continue;
            const nearby = game.spatialHash.query(e.x, e.y, e.size + 10);
            for (const ne of nearby) {
                if (ne === e || ne.dead) continue;
                const d = distXY(ne.x, ne.y, e.x, e.y);
                const minDist = e.size / 2 + ne.size / 2 + 3; // 3px gap
                if (d < minDist && d > 0.01) {
                    resolved = false;
                    const overlap = minDist - d;
                    const ax = (e.x - ne.x) / d;
                    const ay = (e.y - ne.y) / d;
                    e.x += ax * overlap * 0.5;
                    e.y += ay * overlap * 0.5;
                    ne.x -= ax * overlap * 0.5;
                    ne.y -= ay * overlap * 0.5;
                }
            }
        }
        if (resolved) break;
    }
}

// ==================== UPDATE: ENEMIES ====================
function updateEnemies(dt) {
    const slowMult = (game.charId === 'shadow' && game.ultActive) ? (CHARS.shadow.ultSlowMult) : 1;
    const timeWarpMult = (game.timeWarpActive) ? (game.timeWarpSlow || 0.5) : 1;

    for (let i = game.enemies.length - 1; i >= 0; i--) {
        const e = game.enemies[i];
        if (e.dead) { game.enemies.splice(i, 1); continue; }
        if (e.previewTimer > 0) { e.previewTimer -= dt; continue; }
        if (e.frozenTimer > 0) { e.frozenTimer -= dt; continue; }
        if (e.flashTimer > 0) e.flashTimer -= dt;
        if (e.contactCD > 0) e.contactCD -= dt;
        if (e.fadeIn > 0) e.fadeIn -= dt;
        // Burn DOT
        if (e.burnTimer > 0) { e.burnTimer -= dt; e.hp -= 3 * dt; if (e.hp <= 0 && !e.dead) killEnemy(e); }

        const a = angleXY(e.x, e.y, game.px, game.py);
        e.facing = a;

        // Warlord command aura: buff nearby enemies
        let spdMult = slowMult * timeWarpMult;
        let dmgBuff = 1;
        if (e.isBoss && e.type === 'warlord') {
            // handled in updateBoss
        }
        // Check if near a Warlord boss
        if (!e.isBoss && game.boss && game.boss.type === 'warlord' && !game.boss.dead) {
            const auraRange = game.boss.commandAuraRange || 120;
            if (distXY(e.x, e.y, game.boss.x, game.boss.y) < auraRange) {
                spdMult *= 1.3; dmgBuff = 1.3;
            }
        }

        if (e.isBoss) { updateBoss(e, dt, spdMult); continue; }

        // Bomber enrage
        if (e.type === 'bomber' && e.hp / e.maxHp < 0.5) spdMult *= 1.8;

        // Magnet field slow
        if (game.magnetField && distXY(e.x, e.y, game.px, game.py) < 40) spdMult *= 0.8;

        // Frozen trail slow
        for (const seg of game.frozenTrailSegs) {
            if (distXY(e.x, e.y, seg.x, seg.y) < 15) { spdMult *= 0.6; break; }
        }

        if (e.type === 'spitter') {
            const d = distXY(e.x, e.y, game.px, game.py);
            if (d > 120) { e.x += Math.cos(a) * e.speed * 60 * dt * spdMult; e.y += Math.sin(a) * e.speed * 60 * dt * spdMult; }
            else if (d < 80) { e.x -= Math.cos(a) * e.speed * 60 * dt * spdMult; e.y -= Math.sin(a) * e.speed * 60 * dt * spdMult; }
            e.specialTimer -= dt;
            if (e.specialTimer <= 0 && d <= 250) {
                e.specialTimer = 2;
                for (let i = -1; i <= 1; i++) { const sa = a + i * 0.2; game.projectiles.push({ x: e.x, y: e.y, dx: Math.cos(sa), dy: Math.sin(sa), speed: 4, damage: e.damage * game.stageDef.diffMult, piercing: 0, owner: 'enemy', lifetime: 3 }); }
            }
        } else if (e.type === 'healer') {
            e.x += Math.cos(a) * e.speed * 60 * dt * spdMult; e.y += Math.sin(a) * e.speed * 60 * dt * spdMult;
            e.healPulseTimer -= dt;
            if (e.healPulseTimer <= 0) {
                e.healPulseTimer = 2;
                const nearby = game.spatialHash.query(e.x, e.y, 80);
                for (const ne of nearby) { if (ne.isEnemy && !ne.dead && ne !== e && distXY(ne.x, ne.y, e.x, e.y) < 80) ne.hp = Math.min(ne.maxHp, ne.hp + 3); }
                game.particles.push({ x: e.x, y: e.y, dx: 0, dy: 0, lifetime: 0.5, maxLifetime: 0.5, size: 40, color: '#4a7c7c', alpha: 0.3 });
            }
        } else if (e.type === 'flanker') {
            const d = distXY(e.x, e.y, game.px, game.py);
            if (d > 80) {
                const tx = game.px + Math.cos(game.facing + Math.PI) * 60;
                const ty = game.py + Math.sin(game.facing + Math.PI) * 60;
                const moveA = angleXY(e.x, e.y, tx, ty);
                e.x += Math.cos(moveA) * e.speed * 60 * dt * spdMult;
                e.y += Math.sin(moveA) * e.speed * 60 * dt * spdMult;
            } else {
                e.x += Math.cos(a) * e.speed * 1.5 * 60 * dt * spdMult;
                e.y += Math.sin(a) * e.speed * 1.5 * 60 * dt * spdMult;
            }
        } else if (e.type === 'charger') {
            if (!e.isCharging) {
                e.x += Math.cos(a) * e.speed * 60 * dt * spdMult;
                e.y += Math.sin(a) * e.speed * 60 * dt * spdMult;
                if (!e.chargeTimer || e.chargeTimer <= 0) { e.chargeTimer = 2; }
                e.chargeTimer -= dt;
                if (e.chargeTimer <= 0) { e.isCharging = true; e.chargeDir = a; e.chargeDur = 0.4; }
            } else {
                e.x += Math.cos(e.chargeDir) * 6 * 60 * dt;
                e.y += Math.sin(e.chargeDir) * 6 * 60 * dt;
                e.chargeDur -= dt;
                if (e.chargeDur <= 0) { e.isCharging = false; e.chargeTimer = 1.0; }
            }
        } else {
            e.x += Math.cos(a) * e.speed * 60 * dt * spdMult;
            e.y += Math.sin(a) * e.speed * 60 * dt * spdMult;
        }

        // Contact damage
        const d = distXY(e.x, e.y, game.px, game.py);
        const contactDist = e.size / 2 + game.charDef.size / 2;
        if (d < contactDist && e.contactCD <= 0) {
            damagePlayer(e.damage, e);
            e.contactCD = CONTACT_CD;
        }
        if (!e.isBoss && Math.hypot(e.x, e.y) > ARENA_RADIUS + 200) game.enemies.splice(i, 1);
    }
}

function updateBoss(boss, dt, slowMult) {
    const a = angleXY(boss.x, boss.y, game.px, game.py);
    boss.facing = a;
    if (boss.teleportCD > 0) boss.teleportCD -= dt;
    if (!boss.isCharging) { boss.x += Math.cos(a) * boss.speed * 60 * dt * slowMult; boss.y += Math.sin(a) * boss.speed * 60 * dt * slowMult; }

    if (boss.type === 'colossus') {
        boss.slamTimer -= dt;
        if (boss.slamTimer <= 0) {
            boss.slamTimer = 5;
            if (distXY(boss.x, boss.y, game.px, game.py) < 100 + game.charDef.size / 2) { damagePlayer(20, boss); const ka = angleXY(boss.x, boss.y, game.px, game.py); game.px += Math.cos(ka) * 60; game.py += Math.sin(ka) * 60; }
            game.screenShake = 0.3; game.screenShakeIntensity = 8;
            for (let i = 0; i < 20; i++) { const sa = (Math.PI * 2 / 20) * i; game.particles.push({ x: boss.x, y: boss.y, dx: Math.cos(sa) * 80, dy: Math.sin(sa) * 80, lifetime: 0.4, maxLifetime: 0.4, size: 6, color: '#3d2b1f', alpha: 1 }); }
        }
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonTimer = 10; for (let i = 0; i < 5; i++) game.enemies.push(createEnemy('walker', boss.x + rand(-40, 40), boss.y + rand(-40, 40), game.stageDef.diffMult)); }
    } else if (boss.type === 'necromancer') {
        boss.orbTimer -= dt;
        if (boss.orbTimer <= 0) { boss.orbTimer = 3; for (let i = -1; i <= 1; i++) { const oa = a + i * 0.3; game.projectiles.push({ x: boss.x, y: boss.y, dx: Math.cos(oa), dy: Math.sin(oa), speed: 3, damage: 12, piercing: 0, owner: 'enemy', lifetime: 4 }); } }
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonAlt = !boss.summonAlt; boss.summonTimer = boss.summonAlt ? 12 : 8; game.enemies.push(createEnemy(boss.summonAlt ? 'shielder' : 'spitter', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); }
    } else if (boss.type === 'hiveQueen') {
        if (boss.hp / boss.maxHp <= 0.5 && boss.bossPhase === 0) { boss.bossPhase = 1; addFloatingText(boss.x, boss.y - 30, t('phase2'), '#ffcc00', 20); }
        const chargeFreq = boss.bossPhase === 1 ? 3 : 6;
        if (!boss.isCharging) { boss.chargeTimer -= dt; if (boss.chargeTimer <= 0) { boss.isCharging = true; boss.chargeDir = a; boss.chargeDur = 0.5; } }
        if (boss.isCharging) { boss.x += Math.cos(boss.chargeDir) * 8 * 60 * dt; boss.y += Math.sin(boss.chargeDir) * 8 * 60 * dt; boss.chargeDur -= dt;
            game.particles.push({ x: boss.x + rand(-5, 5), y: boss.y + rand(-5, 5), dx: 0, dy: 0, lifetime: 3, maxLifetime: 3, size: 10, color: '#3d3d1f', alpha: 0.6, isAcid: true });
            if (distXY(boss.x, boss.y, game.px, game.py) < boss.size / 2 + game.charDef.size / 2 && boss.contactCD <= 0) { damagePlayer(25, boss); boss.contactCD = 0.5; }
            if (boss.chargeDur <= 0) { boss.isCharging = false; boss.chargeTimer = chargeFreq; }
        }
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonTimer = boss.bossPhase === 1 ? 4 : 5; for (let i = 0; i < 8; i++) game.enemies.push(createEnemy('swarmer', boss.x + rand(-20, 20), boss.y + rand(-20, 20), game.stageDef.diffMult)); }
        if (boss.bossPhase === 1) { boss.orbTimer -= dt; if (boss.orbTimer <= 0) { boss.orbTimer = 8; for (let i = 0; i < 2; i++) game.enemies.push(createEnemy('spitter', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); } }
    } else if (boss.type === 'warlord') {
        if (boss.hp / boss.maxHp <= 0.4 && boss.bossPhase === 0) { boss.bossPhase = 1; boss.commandAuraRange = 240; addFloatingText(boss.x, boss.y - 30, t('phase2'), '#ffcc00', 20); }
        const chargeCD = boss.bossPhase === 1 ? 2.5 : 4;
        // Charge
        if (!boss.isCharging) { boss.chargeTimer -= dt; if (boss.chargeTimer <= 0) { boss.isCharging = true; boss.chargeDir = a; boss.chargeDur = 0.4; } }
        if (boss.isCharging) {
            boss.x += Math.cos(boss.chargeDir) * 10 * 60 * dt; boss.y += Math.sin(boss.chargeDir) * 10 * 60 * dt; boss.chargeDur -= dt;
            if (distXY(boss.x, boss.y, game.px, game.py) < boss.size / 2 + game.charDef.size / 2 && boss.contactCD <= 0) { damagePlayer(25, boss); game.stunTimer = 0.5; boss.contactCD = 0.5; }
            if (boss.chargeDur <= 0) { boss.isCharging = false; boss.chargeTimer = chargeCD; }
        }
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonAlt = !boss.summonAlt; boss.summonTimer = boss.summonAlt ? 15 : 6; game.enemies.push(createEnemy(boss.summonAlt ? 'shielder' : 'runner', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); if (!boss.summonAlt) game.enemies.push(createEnemy('runner', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); }
    } else if (boss.type === 'plagueDoctor') {
        if (boss.hp / boss.maxHp <= 0.5 && boss.bossPhase === 0) { boss.bossPhase = 1; addFloatingText(boss.x, boss.y - 30, t('phase2'), '#ffcc00', 20); }
        // Poison flask
        boss.flaskTimer -= dt;
        if (boss.flaskTimer <= 0) {
            boss.flaskTimer = 3;
            const numFlasks = boss.bossPhase === 1 ? 3 : 1;
            for (let i = 0; i < numFlasks; i++) {
                const tx = game.px + rand(-50, 50), ty = game.py + rand(-50, 50);
                boss.poisonClouds.push({ x: tx, y: ty, lifetime: 4, radius: 60 });
            }
        }
        // Weaken curse
        boss.curseTimer -= dt;
        if (boss.curseTimer <= 0) {
            boss.curseTimer = 8;
            game.weakenMult = boss.bossPhase === 1 ? 0.65 : 0.8;
            game.weakenTimer = 5;
            addFloatingText(game.px, game.py - 20, 'WEAKENED!', '#8844aa', 14);
        }
        // Summon
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonAlt = !boss.summonAlt; boss.summonTimer = boss.summonAlt ? 10 : 8; game.enemies.push(createEnemy(boss.summonAlt ? 'bomber' : 'healer', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); }
        // Poison cloud damage
        for (let i = boss.poisonClouds.length - 1; i >= 0; i--) {
            const cloud = boss.poisonClouds[i]; cloud.lifetime -= dt;
            if (distXY(cloud.x, cloud.y, game.px, game.py) < cloud.radius) {
                if (!cloud._dmgCD || cloud._dmgCD <= 0) { cloud._dmgCD = 1; damagePlayer(4, null); }
            }
            if (cloud._dmgCD > 0) cloud._dmgCD -= dt;
            if (cloud.lifetime <= 0) boss.poisonClouds.splice(i, 1);
        }
    } else if (boss.type === 'abyssKing') {
        // Phase 2 at 60%
        if (boss.hp / boss.maxHp <= 0.6 && boss.bossPhase === 0) { boss.bossPhase = 1; boss.shieldHP = 500; boss.shieldRegenTimer = 30; addFloatingText(boss.x, boss.y - 30, t('phase2'), '#ffcc00', 20); }
        // Phase 3 at 25%
        if (boss.hp / boss.maxHp <= 0.25 && boss.bossPhase === 1) { boss.bossPhase = 2; addFloatingText(boss.x, boss.y - 30, t('phase3'), '#ffcc00', 20); }
        // Dark Beam
        boss.beamTimer -= dt;
        if (boss.beamTimer <= 0 && !boss.beamActive) {
            boss.beamActive = true; boss.beamDur = 2; boss.beamAngle = a;
            boss.beamTimer = boss.bossPhase >= 1 ? 4 : 6;
        }
        if (boss.beamActive) {
            const beamSpeed = boss.bossPhase >= 1 ? 1.5 : 0.75;
            boss.beamAngle += beamSpeed * dt;
            boss.beamDur -= dt;
            // Check beam damage
            const beamLen = 400;
            for (let d = 20; d < beamLen; d += 30) {
                const bx = boss.x + Math.cos(boss.beamAngle) * d;
                const by = boss.y + Math.sin(boss.beamAngle) * d;
                if (distXY(bx, by, game.px, game.py) < 20) {
                    if (!boss._beamDmgCD || boss._beamDmgCD <= 0) { damagePlayer(20, boss); boss._beamDmgCD = 0.2; }
                }
            }
            if (boss._beamDmgCD > 0) boss._beamDmgCD -= dt;
            if (boss.beamDur <= 0) boss.beamActive = false;
        }
        // Abyss Rift
        boss.riftTimer -= dt;
        if (boss.riftTimer <= 0) {
            boss.riftTimer = 12;
            boss.rifts.push({ x: boss.x + rand(-100, 100), y: boss.y + rand(-100, 100), lifetime: 9, spawnTimer: 3 });
        }
        for (let i = boss.rifts.length - 1; i >= 0; i--) {
            const rift = boss.rifts[i]; rift.lifetime -= dt; rift.spawnTimer -= dt;
            if (rift.spawnTimer <= 0) {
                rift.spawnTimer = 3;
                const specials = ['spitter','bomber','shielder','healer','flanker','charger'];
                game.enemies.push(createEnemy(specials[randInt(0, 5)], rift.x + rand(-10, 10), rift.y + rand(-10, 10), game.stageDef.diffMult));
            }
            if (rift.lifetime <= 0) boss.rifts.splice(i, 1);
        }
        // Summon swarmers
        boss.summonTimer -= dt;
        if (boss.summonTimer <= 0) { boss.summonTimer = 4; for (let i = 0; i < 3; i++) game.enemies.push(createEnemy('swarmer', boss.x + rand(-20, 20), boss.y + rand(-20, 20), game.stageDef.diffMult)); }
        // Phase 2 shield
        if (boss.bossPhase >= 1 && boss.shieldHP > 0) { boss.shieldRegenTimer -= dt; if (boss.shieldRegenTimer <= 0) { boss.shieldHP = 500; boss.shieldRegenTimer = 30; } }
        // Phase 3 teleport
        if (boss.bossPhase >= 2) { boss.orbTimer -= dt; if (boss.orbTimer <= 0) { boss.orbTimer = 8; boss.x = game.px + rand(-300, 300); boss.y = game.py + rand(-300, 300); for (let i = 0; i < 2; i++) game.enemies.push(createEnemy('shielder', boss.x + rand(-30, 30), boss.y + rand(-30, 30), game.stageDef.diffMult)); } }
    }

    if (game.boss === boss) game.bossHPPercent = Math.max(0, boss.hp / boss.maxHp);
}

// Override damageEnemy for Abyss King shield
const _origDamageEnemy = damageEnemy;
damageEnemy = function(enemy, dmg, forceCrit) {
    if (enemy.dead) return;
    // Abyss King shield
    if (enemy.isBoss && enemy.type === 'abyssKing' && enemy.shieldHP > 0 && enemy.bossPhase >= 1) {
        const overflow = Math.max(0, dmg - enemy.shieldHP);
        enemy.shieldHP -= dmg;
        addFloatingText(enemy.x, enemy.y - enemy.size, 'SHIELD -' + Math.round(dmg), '#8844ff', 12);
        enemy.flashTimer = 0.1;
        if (enemy.shieldHP <= 0) { enemy.shieldHP = 0; addFloatingText(enemy.x, enemy.y - enemy.size - 10, 'SHIELD BREAK!', '#ffcc00', 16); }
        if (overflow > 0) _origDamageEnemy(enemy, overflow, forceCrit);
        return;
    }
    _origDamageEnemy(enemy, dmg, forceCrit);
};

// ==================== UPDATE: EXPLOSIONS ====================
function updateExplosions(dt) {
    for (let i = game.explosions.length - 1; i >= 0; i--) {
        const ex = game.explosions[i]; ex.timer -= dt;
        if (ex.timer <= 0) {
            if (distXY(ex.x, ex.y, game.px, game.py) < ex.radius + game.charDef.size / 2) damagePlayer(ex.damage, null);
            for (let j = 0; j < 16; j++) { const a = (Math.PI * 2 / 16) * j; game.particles.push({ x: ex.x, y: ex.y, dx: Math.cos(a) * ex.radius * 2, dy: Math.sin(a) * ex.radius * 2, lifetime: 0.3, maxLifetime: 0.3, size: 5, color: '#ff4422', alpha: 1 }); }
            game.particles.push({ x: ex.x, y: ex.y, dx: 0, dy: 0, lifetime: 0.5, maxLifetime: 0.5, size: ex.radius, color: '#ff2200', alpha: 0.5, isRing: true });
            game.explosions.splice(i, 1);
        }
    }
}

// ==================== UPDATE: PROJECTILES ====================
function updateProjectiles(dt) {
    for (let i = game.projectiles.length - 1; i >= 0; i--) {
        const p = game.projectiles[i];
        p.x += p.dx * p.speed * 60 * dt; p.y += p.dy * p.speed * 60 * dt; p.lifetime -= dt;
        if (p.lifetime <= 0) { game.projectiles.splice(i, 1); continue; }
        if (p.owner === 'player') {
            const nearby = game.spatialHash.query(p.x, p.y, 30);
            for (const e of nearby) {
                if (!e.isEnemy || e.dead) continue;
                if (distXY(p.x, p.y, e.x, e.y) < e.size / 2 + 3) {
                    damageEnemy(e, p.damage, !!p.isCrit);
                    if (p.knockback) { const ka = angleXY(game.px, game.py, e.x, e.y); e.x += Math.cos(ka) * 10 * p.knockback; e.y += Math.sin(ka) * 10 * p.knockback; }
                    if (p.piercing > 0) p.piercing--; else {
                        let shouldRemove = true;
                        // Ricochet
                        if (game.ricochet > 0 && p.ricochetCount !== 0) {
                            p.ricochetCount = (p.ricochetCount || game.ricochet) - 1;
                            const nextTarget = game.enemies.find(ne => ne !== e && !ne.dead && distXY(p.x, p.y, ne.x, ne.y) < 150);
                            if (nextTarget) { const ra = angleXY(p.x, p.y, nextTarget.x, nextTarget.y); p.dx = Math.cos(ra); p.dy = Math.sin(ra); shouldRemove = false; break; }
                        }
                        // Explosive Shot
                        if (game.explosiveShot && p.owner === 'player' && shouldRemove) {
                            const nearExp = game.spatialHash.query(p.x, p.y, game.explosionRadius);
                            for (const ae of nearExp) {
                                if (ae.isEnemy && !ae.dead && ae !== e && distXY(p.x, p.y, ae.x, ae.y) < game.explosionRadius) damageEnemy(ae, game.atk * game.explosionDmgMult, false);
                            }
                            game.particles.push({ x: p.x, y: p.y, dx: 0, dy: 0, lifetime: 0.3, maxLifetime: 0.3, size: game.explosionRadius, color: '#ff8844', alpha: 0.5, isRing: true, expandRate: 60 });
                        }
                        if (shouldRemove) { game.projectiles.splice(i, 1); break; }
                    }
                }
            }
        } else if (p.owner === 'enemy') {
            if (distXY(p.x, p.y, game.px, game.py) < game.charDef.size / 2 + 4) { damagePlayer(p.damage, null); game.projectiles.splice(i, 1); }
        }
    }
}

// ==================== UPDATE: XP ORBS ====================
function updateXPOrbs(dt) {
    for (let i = game.xpOrbs.length - 1; i >= 0; i--) {
        const orb = game.xpOrbs[i]; orb.lifetime -= dt;
        const d = distXY(orb.x, orb.y, game.px, game.py);
        if (d < game.pickupRange) { const a = angleXY(orb.x, orb.y, game.px, game.py); const speed = Math.max(200, 400 - d); orb.x += Math.cos(a) * speed * dt; orb.y += Math.sin(a) * speed * dt; }
        if (d < 10) {
            game.xp += orb.xp * (game.xpMult || 1); game.xpOrbs.splice(i, 1);
            while (game.xp >= game.xpToNext && game.level < MAX_LEVEL) { game.xp -= game.xpToNext; game.level++; game.xpToNext = 8 * (game.level + 1); addFloatingText(game.px, game.py - 30, t('levelUp'), '#ffcc00', 20); game.particles.push({ x: game.px, y: game.py, dx: 0, dy: 0, lifetime: 0.6, maxLifetime: 0.6, size: 10, color: '#ffcc00', alpha: 0.8, isRing: true, expandRate: 120 }); game.pendingLevelUps++; }
            if (game.pendingLevelUps > 0 && !game.paused) { game.pendingLevelUps--; showLevelUp(); }
        } else if (orb.lifetime <= 0) { game.xpOrbs.splice(i, 1); }
    }
}

// ==================== UPDATE: PARTICLES ====================
function updateParticles(dt) {
    for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.x += p.dx * dt; p.y += p.dy * dt; p.dx *= 0.95; p.dy *= 0.95; p.lifetime -= dt;
        if (p.lifetime <= 0) { game.particles.splice(i, 1); continue; }
        p.alpha = clamp(p.lifetime / p.maxLifetime, 0, 1);
        if (p.isAcid) { if (distXY(p.x, p.y, game.px, game.py) < 15) { if (!p._acidCD || p._acidCD <= 0) { p._acidCD = 1; damagePlayer(5, null); } } }
        if (p._acidCD > 0) p._acidCD -= dt;
    }
    for (let i = game.floatingTexts.length - 1; i >= 0; i--) { game.floatingTexts[i].y -= 40 * dt; game.floatingTexts[i].lifetime -= dt; if (game.floatingTexts[i].lifetime <= 0) game.floatingTexts.splice(i, 1); }
    // Frozen trail decay
    for (let i = game.frozenTrailSegs.length - 1; i >= 0; i--) { game.frozenTrailSegs[i].lifetime -= dt; if (game.frozenTrailSegs[i].lifetime <= 0) game.frozenTrailSegs.splice(i, 1); }
    // Poison clouds
    for (let i = game.poisonClouds.length - 1; i >= 0; i--) {
        const pc = game.poisonClouds[i]; pc.lifetime -= dt; pc.tickTimer -= dt;
        if (pc.tickTimer <= 0) { pc.tickTimer = 0.5; for (const e of game.enemies) { if (!e.dead && distXY(e.x, e.y, pc.x, pc.y) < pc.radius) { damageEnemy(e, pc.damage, false); } } }
        if (pc.lifetime <= 0) game.poisonClouds.splice(i, 1);
    }
}

// ==================== UPDATE: SPAWN ====================
function updateSpawn(dt) {
    game.difficultyTimer += dt;
    if (game.difficultyTimer >= 30) { game.difficultyTimer -= 30; const mults = [1.0,1.2,1.5,1.8,2.2,2.8]; game.spawnRateMult = mults[Math.min(mults.length - 1, Math.floor(game.gameTime / 30))]; }

    const normalMult = game.stageDef.normalSpawnMult;
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0 && game.enemies.length < MAX_ENEMIES_SOFT) { game.spawnTimer = getSpawnInterval() / game.spawnRateMult / normalMult; spawnNormalEnemy(); }

    const specialMult = game.stageDef.specialSpawnMult;
    game.specialSpawnTimer -= dt;
    if (game.specialSpawnTimer <= 0) {
        if (game.gameTime > 45 || game.stageDef.specialFromStart) spawnSpecialEnemy();
        game.specialSpawnTimer = rand(15, 25) / specialMult;
    }

    if (!game.bossSpawned && game.gameTime >= game.stageDef.bossTime) spawnBoss();
}

// ==================== UPDATE: STAGE ====================
function updateStage(dt) {
    game.gameTime += dt; game.stageTime -= dt;
    if (game.bossDefeated && !game.runOver) { game.runOver = true; game.stageComplete = true; const bonus = 100 * game.stage; game.gold += bonus; game.totalGoldEarned += bonus; endRun(true); }
    if (game.stageTime <= 0 && !game.bossDefeated && !game.runOver) { game.runOver = true; game.stageFailed = true; endRun(false); }
}

// ==================== END RUN ====================
function endRun(victory) {
    saveData.gold += Math.floor(game.totalGoldEarned); saveData.totalRuns++; saveData.totalKills += game.kills;
    if (victory && game.stage < 6 && !saveData.unlockedStages.includes(game.stage + 1)) saveData.unlockedStages.push(game.stage + 1);
    saveSave();
    const title = document.getElementById('resultsTitle');
    title.textContent = victory ? t('stageComplete') : t('stageFailed');
    title.style.color = victory ? '#ffcc00' : '#cc3333';
    document.getElementById('resultsStats').innerHTML = `${t('goldEarned')}: <span>${Math.floor(game.totalGoldEarned)}</span><br>${t('kills')}: <span>${game.kills}</span><br>${t('timeSurvived')}: <span>${Math.floor(game.gameTime)}s</span><br>${t('levelReached')}: <span>${game.level}</span>`;
    setTimeout(() => switchScreen('results'), 500);
}

// ==================== SPATIAL HASH REBUILD ====================
function rebuildSpatialHash() { game.spatialHash.clear(); for (const e of game.enemies) if (!e.dead) game.spatialHash.insert(e); }

// ==================== RENDERING ====================
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!game || (currentScreen !== 'inGame' && currentScreen !== 'levelUp' && currentScreen !== 'pause' && currentScreen !== 'results')) return;

    const camX = game.px - canvas.width / 2, camY = game.py - canvas.height / 2;
    let shakeX = 0, shakeY = 0;
    if (game.screenShake > 0) { shakeX = rand(-game.screenShakeIntensity, game.screenShakeIntensity); shakeY = rand(-game.screenShakeIntensity, game.screenShakeIntensity); }

    ctx.save(); ctx.translate(-camX + shakeX, -camY + shakeY);

    renderGround(camX, camY);
    renderFrozenTrail();
    // Poison clouds
    for (const pc of game.poisonClouds) {
        ctx.fillStyle = `rgba(80,200,80,${0.3 * (pc.lifetime / 3)})`;
        ctx.beginPath(); ctx.arc(pc.x, pc.y, pc.radius, 0, Math.PI * 2); ctx.fill();
    }
    renderXPOrbs();
    renderEnemies();
    renderProjectiles();
    renderPlayer();
    renderOrbitalShield();
    renderParticles();

    ctx.restore();

    renderHUD();
    if (game.bossSpawned && game.boss && !game.bossDefeated) renderBossHPBar();
    if (game.screenFlash > 0) { ctx.fillStyle = game.screenFlashColor; ctx.globalAlpha = game.screenFlash; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1; }
}

function renderGround(camX, camY) {
    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
    const startX = Math.floor(camX / 64) * 64, startY = Math.floor(camY / 64) * 64;
    for (let x = startX; x < camX + canvas.width + 64; x += 64) { ctx.beginPath(); ctx.moveTo(x, camY); ctx.lineTo(x, camY + canvas.height); ctx.stroke(); }
    for (let y = startY; y < camY + canvas.height + 64; y += 64) { ctx.beginPath(); ctx.moveTo(camX, y); ctx.lineTo(camX + canvas.width, y); ctx.stroke(); }
    // Arena boundary
    const pulseAlpha = game.arenaWarning ? 0.4 + 0.2 * Math.sin(Date.now() / 200) : 0.15;
    ctx.strokeStyle = `rgba(180,30,30,${pulseAlpha})`; ctx.lineWidth = game.arenaWarning ? 4 : 2;
    ctx.beginPath(); ctx.arc(0, 0, ARENA_RADIUS, 0, Math.PI * 2); ctx.stroke();
    if (game.arenaWarning) {
        ctx.strokeStyle = `rgba(180,30,30,${0.1 + 0.05 * Math.sin(Date.now() / 150)})`; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.arc(0, 0, ARENA_RADIUS, 0, Math.PI * 2); ctx.stroke();
    }
}

function renderFrozenTrail() {
    for (const seg of game.frozenTrailSegs) {
        ctx.fillStyle = `rgba(100,180,255,${0.3 * (seg.lifetime / 2)})`;
        ctx.beginPath(); ctx.arc(seg.x, seg.y, 6, 0, Math.PI * 2); ctx.fill();
    }
}

function renderXPOrbs() {
    ctx.fillStyle = '#44ff44';
    for (const orb of game.xpOrbs) { ctx.globalAlpha = 0.8; ctx.beginPath(); ctx.arc(orb.x, orb.y, 3, 0, Math.PI * 2); ctx.fill(); }
    ctx.globalAlpha = 1;
}

function renderEnemies() {
    const camX = game.px - canvas.width / 2, camY = game.py - canvas.height / 2;
    const visible = game.enemies.filter(e => !e.dead && e.x - camX > -50 && e.x - camX < canvas.width + 50 && e.y - camY > -50 && e.y - camY < canvas.height + 50);
    visible.sort((a, b) => a.y - b.y);

    for (const e of visible) {
        if (e.previewTimer > 0) { ctx.globalAlpha = 0.3; ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(e.x, e.y, e.size / 2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; continue; }
        if (e.frozenTimer > 0) { ctx.fillStyle = '#88ccff44'; ctx.beginPath(); ctx.arc(e.x, e.y, e.size / 2 + 3, 0, Math.PI * 2); ctx.fill(); }
        const size = (e.hp / e.maxHp < 0.3) ? e.size * 0.85 : e.size;
        const fadeAlpha = e.fadeIn > 0 ? 1 - (e.fadeIn / 0.3) : 1;

        ctx.globalAlpha = fadeAlpha;

        // Bomber pulse
        if (e.type === 'bomber' && e.hp / e.maxHp < 0.5) { ctx.strokeStyle = `rgba(255,0,0,${0.3 + 0.3 * Math.sin(Date.now() / 100)})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, size / 2 + 4, 0, Math.PI * 2); ctx.stroke(); }
        // Burn flicker
        if (e.burnTimer > 0) { ctx.fillStyle = `rgba(255,140,0,${0.2 * Math.random()})`; ctx.beginPath(); ctx.arc(e.x, e.y, size / 2 + 2, 0, Math.PI * 2); ctx.fill(); }

        ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : e.color;
        ctx.beginPath(); ctx.arc(e.x, e.y, size / 2, 0, Math.PI * 2); ctx.fill();

        if (e.special && !e.isBoss) { ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(e.x, e.y, size / 2 + 2, 0, Math.PI * 2); ctx.stroke(); }
        if (e.isBoss) {
            ctx.strokeStyle = e.color + '88'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(e.x, e.y, size / 2 + 4 + Math.sin(Date.now() / 200) * 3, 0, Math.PI * 2); ctx.stroke();
            const bw = e.size + 10, bh = 4, bx = e.x - bw / 2, by = e.y + e.size / 2 + 6;
            ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, bh);
            ctx.fillStyle = '#cc3333'; ctx.fillRect(bx, by, bw * Math.max(0, e.hp / e.maxHp), bh);
            // Abyss King shield bar
            if (e.type === 'abyssKing' && e.shieldHP > 0) { ctx.fillStyle = '#8844ff'; ctx.fillRect(bx, by - 5, bw * (e.shieldHP / 500), 3); }
        }
        if (e.type === 'shielder' && !e.isBoss) { ctx.strokeStyle = '#88888866'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(e.x, e.y, size / 2 + 1, e.facing - Math.PI / 2, e.facing + Math.PI / 2); ctx.stroke(); }
        if (e.type === 'healer' && e.healPulseTimer > 1.5) { ctx.strokeStyle = '#4a7c7c44'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, e.y, 80 * (1 - (e.healPulseTimer - 1.5) / 0.5), 0, Math.PI * 2); ctx.stroke(); }
    }
    ctx.globalAlpha = 1;

    // Poison clouds (Plague Doctor)
    if (game.boss && game.boss.poisonClouds) {
        for (const cloud of game.boss.poisonClouds) {
            ctx.fillStyle = `rgba(42,61,26,${0.3 * (cloud.lifetime / 4)})`;
            ctx.beginPath(); ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2); ctx.fill();
        }
    }
    // Abyss rifts
    if (game.boss && game.boss.rifts) {
        for (const rift of game.boss.rifts) {
            ctx.strokeStyle = `rgba(26,26,45,${0.5 * (rift.lifetime / 9)})`;
            ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(rift.x, rift.y, 15, 0, Math.PI * 2); ctx.stroke();
        }
    }
    // Dark beam
    if (game.boss && game.boss.beamActive) {
        ctx.strokeStyle = 'rgba(100,50,180,0.6)'; ctx.lineWidth = 12;
        ctx.beginPath(); ctx.moveTo(game.boss.x, game.boss.y);
        ctx.lineTo(game.boss.x + Math.cos(game.boss.beamAngle) * 400, game.boss.y + Math.sin(game.boss.beamAngle) * 400);
        ctx.stroke();
    }
}

function renderProjectiles() {
    for (const p of game.projectiles) {
        if (p.isShadowBlade) {
            ctx.fillStyle = '#bb66ff';
            const angle = Math.atan2(p.dy, p.dx);
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(0, -3); ctx.lineTo(-8, 0); ctx.lineTo(0, 3); ctx.closePath(); ctx.fill();
            ctx.restore();
        } else {
            ctx.fillStyle = p.owner === 'player' ? (p.isCrit ? '#ffcc00' : '#ffaa44') : '#9944cc';
            ctx.beginPath(); ctx.arc(p.x, p.y, p.owner === 'player' ? 3 : 4, 0, Math.PI * 2); ctx.fill();
        }
    }
}

function renderPlayer() {
    const ch = game.charDef;
    for (const clone of game.clones) { ctx.globalAlpha = 0.5; ctx.fillStyle = '#8844cc'; ctx.beginPath(); ctx.moveTo(clone.x, clone.y - 6); ctx.lineTo(clone.x - 5, clone.y + 6); ctx.lineTo(clone.x + 5, clone.y + 6); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; }

    if (game.charId === 'guardian') { ctx.fillStyle = ch.color; ctx.fillRect(game.px - 9, game.py - 9, 18, 18); ctx.strokeStyle = '#ffffff88'; ctx.lineWidth = 2; ctx.strokeRect(game.px - 9, game.py - 9, 18, 18); }
    else if (game.charId === 'gunslinger') { ctx.fillStyle = ch.color; ctx.save(); ctx.translate(game.px, game.py); ctx.rotate(Math.PI / 4); ctx.fillRect(-7, -7, 14, 14); ctx.restore(); }
    else if (game.charId === 'shadow') { ctx.fillStyle = ch.color; const dir = game.facing; ctx.beginPath(); ctx.moveTo(game.px + Math.cos(dir) * 8, game.py + Math.sin(dir) * 8); ctx.lineTo(game.px + Math.cos(dir + 2.4) * 7, game.py + Math.sin(dir + 2.4) * 7); ctx.lineTo(game.px + Math.cos(dir - 2.4) * 7, game.py + Math.sin(dir - 2.4) * 7); ctx.closePath(); ctx.fill(); }

    if (game.isAttacking && game.attackTimer > 0 && game.charId === 'guardian') { ctx.strokeStyle = '#ffffff88'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(game.px, game.py, game.autoRange, game.attackAngle - game.cleaveArc / 2, game.attackAngle + game.cleaveArc / 2); ctx.stroke(); }
    if (game.ultActive) { ctx.strokeStyle = ch.color + '66'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(game.px, game.py, 25 + Math.sin(Date.now() / 100) * 3, 0, Math.PI * 2); ctx.stroke(); }
    if (game.hasShield && game.shieldReady) { ctx.strokeStyle = '#88ccff44'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(game.px, game.py, ch.size / 2 + 5, 0, Math.PI * 2); ctx.stroke(); }
    if (game.iFrames > 0 && Math.floor(game.iFrames * 20) % 2) { ctx.fillStyle = '#ffffff44'; ctx.beginPath(); ctx.arc(game.px, game.py, ch.size / 2 + 3, 0, Math.PI * 2); ctx.fill(); }
    // Stun indicator
    if (game.stunTimer > 0) { ctx.fillStyle = '#ffff0066'; ctx.beginPath(); ctx.arc(game.px, game.py - ch.size, 4, 0, Math.PI * 2); ctx.fill(); }
}

function renderOrbitalShield() {
    for (const orb of game.orbitalOrbs) {
        const ox = game.px + Math.cos(orb.angle) * 50;
        const oy = game.py + Math.sin(orb.angle) * 50;
        ctx.fillStyle = '#4488ff';
        ctx.beginPath(); ctx.arc(ox, oy, 5, 0, Math.PI * 2); ctx.fill();
    }
}

function renderParticles() {
    // Batch particles by type and color for fewer draw calls
    const ringParticles = [], arcParticles = [], dotBatches = {};
    for (const p of game.particles) {
        ctx.globalAlpha = clamp(p.alpha, 0, 1);
        if (p.isRing) { ringParticles.push(p); }
        else if (p.isArc) { arcParticles.push(p); }
        else {
            const key = p.color;
            if (!dotBatches[key]) dotBatches[key] = [];
            dotBatches[key].push(p);
        }
    }
    // Render ring particles
    ctx.lineWidth = 3;
    for (const p of ringParticles) {
        const currentSize = p.expandRate ? p.size + p.expandRate * (1 - p.lifetime / p.maxLifetime) : p.size;
        ctx.globalAlpha = clamp(p.alpha, 0, 1);
        ctx.strokeStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2); ctx.stroke();
    }
    // Render arc particles
    ctx.lineWidth = 1.5;
    for (const p of arcParticles) {
        ctx.globalAlpha = clamp(p.alpha, 0, 1);
        ctx.strokeStyle = p.color; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty); ctx.stroke();
    }
    // Render dot particles batched by color
    for (const color in dotBatches) {
        ctx.fillStyle = color;
        ctx.beginPath();
        for (const p of dotBatches[color]) {
            ctx.globalAlpha = clamp(p.alpha, 0, 1);
            ctx.moveTo(p.x + p.size, p.y);
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        }
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    for (const ft of game.floatingTexts) { ctx.globalAlpha = clamp(ft.lifetime / ft.maxLifetime, 0, 1); ctx.fillStyle = ft.color; ctx.font = `bold ${ft.size}px sans-serif`; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y); }
    ctx.globalAlpha = 1;
}

function renderHUD() {
    const s = isMobile ? Math.min(canvas.width / 500, 1) : 1;
    // HP
    const hpW = 180 * s, hpH = 16 * s, hpX = 15, hpY = 15;
    ctx.fillStyle = '#333'; ctx.fillRect(hpX, hpY, hpW, hpH);
    const hpPct = clamp(game.hp / game.maxHP, 0, 1);
    ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
    ctx.fillRect(hpX, hpY, hpW * hpPct, hpH);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(hpX, hpY, hpW, hpH);
    ctx.fillStyle = '#fff'; ctx.font = `${12*s}px sans-serif`; ctx.textAlign = 'left';
    ctx.fillText(`${Math.ceil(game.hp)} / ${game.maxHP}`, hpX + 4, hpY + 12 * s);

    // Timer
    ctx.textAlign = 'center'; ctx.font = `${14*s}px sans-serif`;
    const mins = Math.floor(Math.max(0, game.stageTime) / 60);
    const secs = Math.floor(Math.max(0, game.stageTime) % 60);
    ctx.fillStyle = game.stageTime < 60 ? '#cc3333' : '#ccc';
    ctx.fillText(`${t('stage')} ${game.stage} - ${mins}:${secs.toString().padStart(2, '0')}`, canvas.width / 2, 25 * s);
    ctx.fillStyle = '#888'; ctx.font = `${11*s}px sans-serif`;
    ctx.fillText(`${t('enemies')}: ${game.enemies.filter(e => !e.dead).length}`, canvas.width / 2, 42 * s);

    // Gold + Level
    ctx.textAlign = 'right'; ctx.font = `${14*s}px sans-serif`;
    ctx.fillStyle = '#ffcc00'; ctx.fillText(`${t('gold')}: ${game.gold}`, canvas.width - 15, 20 * s);
    ctx.fillStyle = '#ccc'; ctx.fillText(`${t('level')} ${game.level}`, canvas.width - 15, 38 * s);
    const xpW = 120 * s, xpH = 6, xpX = canvas.width - 15 - xpW, xpY = 44 * s;
    ctx.fillStyle = '#333'; ctx.fillRect(xpX, xpY, xpW, xpH);
    ctx.fillStyle = '#4488ff'; ctx.fillRect(xpX, xpY, xpW * (game.level >= MAX_LEVEL ? 1 : clamp(game.xp / game.xpToNext, 0, 1)), xpH);

    // Ultimate (hide canvas version on mobile since we have the HTML button)
    if (!isMobile) {
        const ultX = canvas.width / 2, ultY = canvas.height - 50;
        const ultMaxCD = game.charDef.ultCD * (game.ultCDMult || 1);
        const ultCDPct = game.ultCDTimer > 0 ? clamp(game.ultCDTimer / ultMaxCD, 0, 1) : 0;
        ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(ultX, ultY, 22, 0, Math.PI * 2); ctx.fill();
        if (ultCDPct > 0) { ctx.fillStyle = '#444'; ctx.beginPath(); ctx.moveTo(ultX, ultY); ctx.arc(ultX, ultY, 22, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ultCDPct); ctx.closePath(); ctx.fill(); }
        ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(ultX, ultY, 22, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = game.ultActive ? CHARS[game.charId].color : (game.ultCDTimer <= 0 ? '#ffcc00' : '#888');
        ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(game.ultActive ? t('active') : (game.ultCDTimer <= 0 ? t('ready') : Math.ceil(game.ultCDTimer) + 's'), ultX, ultY + 4);
    } else {
        // Update mobile ult button text
        const ultMaxCD = game.charDef.ultCD * (game.ultCDMult || 1);
        if (game.ultActive) { ultBtn.textContent = t('active'); ultBtn.style.borderColor = CHARS[game.charId].color; ultBtn.style.color = CHARS[game.charId].color; }
        else if (game.ultCDTimer <= 0) { ultBtn.textContent = t('ready'); ultBtn.style.borderColor = '#ffcc00'; ultBtn.style.color = '#ffcc00'; }
        else { ultBtn.textContent = Math.ceil(game.ultCDTimer) + 's'; ultBtn.style.borderColor = 'rgba(255,255,255,.3)'; ultBtn.style.color = '#888'; }
    }

    // Minimap (hide on mobile to save space)
    if (!isMobile) {
    const mw = 100, mh = 100, mx = canvas.width - mw - 10, my = canvas.height - mh - 10;
    const scale = mw / 600;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh);
    ctx.fillStyle = '#fff'; ctx.fillRect(mx + mw / 2 - 2, my + mh / 2 - 2, 4, 4);
    ctx.fillStyle = '#cc3333';
    for (const e of game.enemies) {
        if (e.dead) continue;
        const dx = (e.x - game.px) * scale, dy = (e.y - game.py) * scale;
        if (Math.abs(dx) < mw / 2 && Math.abs(dy) < mh / 2) {
            if (e.isBoss) { ctx.fillStyle = Math.sin(Date.now() / 200) > 0 ? '#ff0000' : '#880000'; ctx.fillRect(mx + mw / 2 + dx - 3, my + mh / 2 + dy - 3, 6, 6); ctx.fillStyle = '#cc3333'; }
            else ctx.fillRect(mx + mw / 2 + dx - 0.5, my + mh / 2 + dy - 0.5, 1, 1);
        }
    }
    } // end minimap

    // Combo counter
    if (game.comboCount >= 3) {
        ctx.fillStyle = '#ff8800';
        ctx.font = `bold ${Math.min(24 + game.comboCount, 40) * s}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(game.comboCount + 'x COMBO', canvas.width / 2, canvas.height - (isMobile ? 100 : 80));
    }

    if (showFPS) { ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.fillText('FPS: ' + fpsDisplay, 15, canvas.height - 10); }
}

function renderBossHPBar() {
    const bw = canvas.width - 40, bh = 10, bx = 20, by = 55;
    ctx.fillStyle = '#333'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#cc3333'; ctx.fillRect(bx, by, bw * game.bossHPPercent, bh);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t('boss') + ': ' + t('bossNames')[game.stage - 1], canvas.width / 2, by - 3);
}

// ==================== GAME LOOP ====================
let lastTime = 0;
function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05); lastTime = timestamp;
    fpsCounter++; fpsTimer += dt; if (fpsTimer >= 1) { fpsDisplay = fpsCounter; fpsCounter = 0; fpsTimer -= 1; }

    if (game && currentScreen === 'inGame' && !game.paused && !game.runOver) {
        // Update order per spec: input → movement → collision resolution → auto-attack → projectiles → enemy AI → collisions(damage) → particles → HUD → render
        updatePlayer(dt);
        updateSpawn(dt);
        updateEnemies(dt);
        resolveCollisions();
        updateExplosions(dt);
        updateProjectiles(dt);
        updateXPOrbs(dt);
        updateParticles(dt);
        updateStage(dt);
        rebuildSpatialHash();
        if (game.screenShake > 0) game.screenShake -= dt;
        if (game.screenFlash > 0) game.screenFlash -= dt;
        if (game.isAttacking) { game.attackTimer -= dt; if (game.attackTimer <= 0) game.isAttacking = false; }
    }
    render();
}

// ==================== INIT ====================
loadSave();
refreshAllUI();
requestAnimationFrame(gameLoop);

let fpsCounter = 0, fpsTimer = 0, fpsDisplay = 0, showFPS = false;
window.addEventListener('keydown', e => { if (e.code === 'F3') { e.preventDefault(); showFPS = !showFPS; } });
</script>
</body>
</html>
